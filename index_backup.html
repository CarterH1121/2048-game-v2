        /* ========== 主容器 ========== */
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        /* ========== 顶部状态区 ========== */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -2px;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .md3-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
            font-size: 0.4em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0;
            box-shadow: var(--shadow-1);
            -webkit-text-fill-color: white;
        }

        .level-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: var(--shadow-1);
            font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 90px;
            min-height: 60px;
        }

        .level-number {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .level-rank {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .level-rank-icon {
            font-size: 0.9rem;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            padding: 10px 20px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }

        .score-panel .score-box {
            flex: 1;
            min-width: 90px;
        }

        .score-panel .level-badge {
            flex: 1;
            white-space: nowrap;
        }

        /* 每日任务进度 */
        .daily-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            margin: 0 20px 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
        }

        .daily-task-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .daily-task-name {
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
            min-width: 80px;
        }

        .daily-task-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            min-width: 60px;
        }

        .daily-task-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-primary), var(--accent-color));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .daily-task-count {
            color: var(--text-primary);
            font-weight: 700;
            white-space: nowrap;
            min-width: 40px;
            text-align: center;
        }

        .daily-task-reward {
            color: #FFD700;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.8rem;
            padding: 3px 8px;
            background: rgba(255,215,0,0.15);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .daily-progress.completed .daily-task-icon {
            color: var(--success-color);
        }

        .daily-progress.completed .daily-task-name {
            color: var(--success-color);
        }

        .daily-progress.completed .daily-task-fill {
            background: var(--success-color);
        }

        .daily-progress.completed .daily-task-reward {
            color: var(--success-color);
            background: rgba(76,175,80,0.15);
            border-color: rgba(76,175,80,0.3);
        }

        .header-center {
            display: none;
        }

        .score-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);  /* 玻璃态边框 */
            padding: 10px 20px;
            border-radius: var(--radius-md);
            text-align: center;
            min-width: 80px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);

        /* ========== 核心游戏区 ========== */

            align-items: center;
            justify-content: center;
            padding: 20px;

        .grid-container {

            background: var(--bg-grid);
            border-radius: 16px;
            padding: 10px;
            touch-action: none;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-3);
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-cell {

            height: 80px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: var(--radius-md);
        }

        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;

        .tile-new {

        @keyframes tile-appear {

            100% { opacity: 1; transform: scale(1); }
        }

        .tile-merged {
            animation: tile-pop 0.2s ease-out;
        }

        @keyframes tile-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }

        .tile-super {
            animation: tile-glow 2s ease-in-out infinite;
            color: #f9f6f2;
        }

        @keyframes tile-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        /* ========== 道具快捷栏 ========== */
        .powerup-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: var(--glass-bg);
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-2);
        }

        .powerup-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .powerup-btn {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .powerup-btn:hover:not(:disabled) {

            background: var(--accent-color);
            color: white;
        }

        .powerup-btn:disabled {

        }

        .powerup-btn-newgame {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
        }

        .powerup-btn-newgame:hover {

        .powerup-item-newgame {

        }

        .powerup-count {

            right: -5px;

            height: 22px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
        }

        .powerup-label {
            font-size: 0.75rem;

        }

        .nav-icon {
            font-size: 1.5rem;
        }

        /* ========== 模态弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 380px;
            max-width: 90%;
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 16px;
            max-height: 90vh;
            overflow: hidden;
            animation: modal-in 0.3s ease-out;
            box-shadow: var(--shadow-4);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

        /* 分享弹窗保持原宽度 */
        .modal:has(.share-card-preview) {
            width: auto;
        }

        @keyframes modal-in {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-body {
            color: var(--text-primary);
            max-height: calc(90vh - 80px);

            padding-right: 8px; /* 为滚动条留出间距 */

        /* 美化的滚动条样式 */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            transition: background 0.2s ease;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

/* Firefox滚动条样式 */
        .modal-body {
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        /* 排行榜列表样式 - 与成就弹窗滚动条一致 */
        .leaderboard-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px; /* 为滚动条留出间距 */
        }

        /* 美化的滚动条样式（与成就弹窗一致） */
        .leaderboard-list::-webkit-scrollbar {
            width: 6px;
        }

        .leaderboard-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .leaderboard-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            transition: background 0.2s ease;
        }

        .leaderboard-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* 震撼合成特效样式 */
        .merge-blur {
            filter: blur(3px) brightness(0.8);
            transition: all 0.3s ease;
        }
        
        .merge-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            pointer-events: none;
        }
        
        .merge-animation {
            text-align: center;
            animation: mergePulse 3s ease-out forwards;
        }
        
        .merge-text {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
            animation: textGlow 3s ease-out forwards;
        }
        
        .merge-particles {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: particleExpand 3s ease-out forwards;
        }
        
        .merge-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowExpand 3s ease-out forwards;
        }
        
        @keyframes mergePulse {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 165, 0, 0.8); }
            100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        }
        
        @keyframes particleExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        
        @keyframes glowExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* 美化的滚动条样式（与成就弹窗一致） */
        .leaderboard-list::-webkit-scrollbar {
            width: 6px;
        }

        .leaderboard-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .leaderboard-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            transition: background 0.2s ease;
        }

        .leaderboard-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* Firefox滚动条样式 */

        .modal-actions {

        .btn {

        }

        .btn-primary:hover {

        }

        .btn-secondary {
            background: var(--btn-secondary);
            color: white;
        }

        .btn-secondary:hover {

        /* ========== 设置面板 ========== */
        .settings-item {
            display: flex;

            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);

        .toggle-switch {

            height: 22px;
            background: white;
            border-radius: 50%;

            left: 2px;

            border-radius: 12px;
        }

        /* ========== 成就解锁动画 - 震撼大型弹窗 ========== */
        .achievement-unlock {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            min-width: 520px;
            max-width: 90vw;
            padding: 60px 50px 50px;
            border-radius: 24px;
            z-index: 1300;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            background: linear-gradient(145deg, 
                rgba(255, 248, 220, 0.95) 0%,
                rgba(255, 235, 180, 0.98) 30%,
                rgba(255, 215, 100, 0.95) 100%
            );
            box-shadow: 
                0 0 0 1px rgba(255, 215, 0, 0.5),
                0 0 30px rgba(255, 215, 0, 0.4),
                0 0 60px rgba(255, 200, 0, 0.3),
                0 0 100px rgba(255, 180, 0, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.6),
                inset 0 -2px 10px rgba(200, 150, 0, 0.2);
            border: 3px solid transparent;
            background-clip: padding-box;
            overflow: visible;
        }

        /* 玻璃态主题适配 */
        body.theme-neon .achievement-unlock,
        body.theme-material .achievement-unlock {
            background: linear-gradient(145deg,
                rgba(20, 25, 40, 0.95) 0%,
                rgba(30, 35, 55, 0.98) 50%,
                rgba(40, 45, 70, 0.95) 100%
            );
            box-shadow:
                0 0 0 1px rgba(255, 215, 0, 0.4),
                0 0 40px rgba(255, 215, 0, 0.3),
                0 0 80px rgba(255, 200, 0, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        /* 光晕背景层 */
        .achievement-unlock::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(255, 215, 0, 0.15) 0%,
                rgba(255, 200, 0, 0.1) 30%,
                rgba(255, 180, 0, 0.05) 50%,
                transparent 70%
            );
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .achievement-unlock.active {
            opacity: 1;
            visibility: visible;
            animation: achievement-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .achievement-unlock.active::before {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes achievement-entrance {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3) rotate(-5deg);
            }
            40% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.08) rotate(1deg);
            }
            70% {
                transform: translate(-50%, -50%) scale(0.95) rotate(-0.5deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0);
            }
        }

        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ========== 粒子爆发特效 ========== */
        /* 中心光爆 */
        .achievement-unlock .particle-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .achievement-unlock .particle-burst::before,
        .achievement-unlock .particle-burst::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
        }

        .achievement-unlock.active .particle-burst::before {
            animation: particle-explode-1 1s ease-out 0.2s forwards;
        }

        .achievement-unlock.active .particle-burst::after {
            animation: particle-explode-2 1s ease-out 0.25s forwards;
        }

        @keyframes particle-explode-1 {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0);
                box-shadow: 
                    60px -30px 0 0 #FFD700,
                    -60px -30px 0 0 #FFA500,
                    0px 70px 0 0 #FFEC8B,
                    80px 40px 0 0 #FFD700,
                    -80px 40px 0 0 #FFA500;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 
                    120px -60px 0 -4px transparent,
                    -120px -60px 0 -4px transparent,
                    0px 140px 0 -4px transparent,
                    160px 80px 0 -4px transparent,
                    -160px 80px 0 -4px transparent;
            }
        }

        @keyframes particle-explode-2 {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0) rotate(45deg);
                box-shadow: 
                    50px 40px 0 0 #FFEC8B,
                    -50px 40px 0 0 #FFD700,
                    90px -20px 0 0 #FFA500,
                    -90px -20px 0 0 #FFD700,
                    0px -80px 0 0 #FFEC8B;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) rotate(45deg);
                box-shadow: 
                    100px 80px 0 -4px transparent,
                    -100px 80px 0 -4px transparent,
                    180px -40px 0 -4px transparent,
                    -180px -40px 0 -4px transparent,
                    0px -160px 0 -4px transparent;
            }
        }

        /* 四角光芒 */
        .achievement-unlock .corner-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 24px;
        }

        .achievement-unlock .corner-glow::before,
        .achievement-unlock .corner-glow::after,
        .achievement-unlock .corner-glow .glow-tl,
        .achievement-unlock .corner-glow .glow-br {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, transparent 70%);
            opacity: 0;
        }

        .achievement-unlock .corner-glow::before {
            top: -20px;
            right: -20px;
        }

        .achievement-unlock .corner-glow::after {
            bottom: -20px;
            left: -20px;
        }

        .achievement-unlock .corner-glow .glow-tl {
            top: -20px;
            left: -20px;
        }

        .achievement-unlock .corner-glow .glow-br {
            bottom: -20px;
            right: -20px;
        }

        .achievement-unlock.active .corner-glow::before {
            animation: corner-flash 1.5s ease-out 0.3s forwards;
        }

        .achievement-unlock.active .corner-glow::after {
            animation: corner-flash 1.5s ease-out 0.35s forwards;
        }

        .achievement-unlock.active .corner-glow .glow-tl {
            animation: corner-flash 1.5s ease-out 0.4s forwards;
        }

        .achievement-unlock.active .corner-glow .glow-br {
            animation: corner-flash 1.5s ease-out 0.45s forwards;
        }

        @keyframes corner-flash {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 1;
                transform: scale(1.5);
            }
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
        }

        /* 环形光波 */
        .achievement-unlock .ring-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border: 3px solid rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
        }

        .achievement-unlock.active .ring-wave {
            animation: ring-expand 1.2s ease-out 0.1s forwards;
        }

        @keyframes ring-expand {
            0% {
                width: 50px;
                height: 50px;
                opacity: 1;
                border-width: 4px;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
                border-width: 1px;
            }
        }

        /* ========== 图标样式 - 大型震撼 ========== */
        .unlock-icon {
            font-size: 5.5rem;
            line-height: 1;
            margin-bottom: 20px;
            display: inline-block;
            position: relative;
            z-index: 10;
            transform: scale(0) rotate(-180deg);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .achievement-unlock.active .unlock-icon {
            animation: icon-grand-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
        }

        @keyframes icon-grand-entrance {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.3) rotate(10deg);
            }
            70% {
                transform: scale(0.9) rotate(-5deg);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        /* 图标光环 */
        .unlock-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 60%);
            border-radius: 50%;
            opacity: 0;
            z-index: -1;
        }

        .achievement-unlock.active .unlock-icon::before {
            animation: icon-glow-in 1s ease-out 0.6s forwards;
        }

        @keyframes icon-glow-in {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 标题样式 */
        .achievement-unlock .gameover-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 30%, #FFEC8B 50%, #FFD700 70%, #DAA520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            animation: title-shimmer 3s ease-in-out infinite;
        }

        .achievement-unlock.active .gameover-title {
            animation: title-entrance 0.6s ease-out 0.4s backwards, title-shimmer 3s ease-in-out 1s infinite;
        }

        @keyframes title-entrance {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes title-shimmer {
            0%, 100% {
                filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)) brightness(1);
            }
            50% {
                filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.5)) brightness(1.1);
            }
        }

        /* 描述文字 */
        .achievement-unlock .tutorial-desc {
            font-size: 1.2rem;
            color: #5D4E37;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(10px);
        }

        body.theme-neon .achievement-unlock .tutorial-desc,
        body.theme-material .achievement-unlock .tutorial-desc {
            color: rgba(255, 255, 255, 0.8);
        }

        .achievement-unlock.active .tutorial-desc {
            animation: desc-fade-in 0.5s ease-out 0.6s forwards;
        }

        @keyframes desc-fade-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮样式 */
        .achievement-unlock .btn-primary,
        .achievement-unlock .btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            color: #4A3000;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px 48px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 
                0 4px 15px rgba(255, 165, 0, 0.4),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
        }

        .achievement-unlock.active .btn-primary,
        .achievement-unlock.active .btn {
            animation: btn-pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;
        }

        @keyframes btn-pop-in {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .achievement-unlock .btn-primary:hover,
        .achievement-unlock .btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 6px 25px rgba(255, 165, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
        }

        .achievement-unlock .btn-primary:active,
        .achievement-unlock .btn:active {
            transform: scale(0.98);
        }

        /* 按钮光泽动画 */
        .achievement-unlock .btn-primary::before,
        .achievement-unlock .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .achievement-unlock .btn-primary:hover::before,
        .achievement-unlock .btn:hover::before {
            left: 100%;
        }

        /* 星星粒子装饰 - 纯CSS */
        .achievement-unlock .star-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .achievement-unlock .star-particles::before,
        .achievement-unlock .star-particles::after {
            content: '✦ ✧ ★ ☆ ✦ ✧';
            position: absolute;
            font-size: 16px;
            color: rgba(255, 215, 0, 0.8);
            white-space: nowrap;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .achievement-unlock .star-particles::before {
            top: 20%;
            left: -20px;
        }

        .achievement-unlock .star-particles::after {
            bottom: 25%;
            right: -30px;
        }

        .achievement-unlock.active .star-particles::before {
            animation: star-float-left 2s ease-out 0.5s forwards;
        }

        .achievement-unlock.active .star-particles::after {
            animation: star-float-right 2s ease-out 0.6s forwards;
        }

        @keyframes star-float-left {
            0% {
                opacity: 0;
                transform: translateX(-30px) translateY(-20px) rotate(-15deg);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
                transform: translateX(0) translateY(10px) rotate(0);
            }
        }

        @keyframes star-float-right {
            0% {
                opacity: 0;
                transform: translateX(30px) translateY(20px) rotate(15deg);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
                transform: translateX(0) translateY(-10px) rotate(0);
            }
        }

        /* ========== 游戏结束动画 ========== */
        .gameover-content {
            text-align: center;
            padding: 10px;
        }

        .gameover-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .gameover-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .gameover-stats {
            margin: 20px 0;
            background: var(--glass-bg);
            border-radius: var(--radius-md);
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-item span:last-child {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        /* ========== 分数增加动画 ========== */
        .score-add {
            position: absolute;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-color);
            pointer-events: none;
            animation: score-float 0.8s ease-out forwards;
        }

        @keyframes score-float {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* ========== 彩纸特效 ========== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
        }

        /* ========== 难度选择 ========== */
        .difficulty-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--bg-grid);
            background: transparent;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .difficulty-btn.active {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: white;
        }

        /* ========== 锁定状态 ========== */
        .locked-feature {
            position: relative;
            opacity: 0.5;
        }

        .locked-feature::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
        }

        .unlock-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 480px) {
            .header {
                padding: 10px 15px;
                flex-direction: column;
                gap: 10px;
            }

            .game-title {
                font-size: 2rem;
            }

            .header-center {
                width: 100%;
                justify-content: center;
            }

            .score-box {
                padding: 8px 15px;
                min-width: 70px;
            }

            .level-badge {
                min-width: 70px;
                min-height: 55px;
                padding: 6px 10px;
            }

            .level-badge .level-number {
                font-size: 0.65rem;
            }

            .level-badge .level-rank {
                font-size: 0.85rem;
            }

            .score-value {
                font-size: 1.2rem;
            }

            .grid-cell {
                width: 65px;
                height: 65px;
            }

            .tile {
                width: 65px !important;
                height: 65px !important;
            }

            .powerup-bar {
                gap: 15px;
            }

            .powerup-btn {
                width: 45px;
                height: 45px;
            }
        }

        @media (min-width: 768px) {
            .grid-cell {
                width: 100px;
                height: 100px;
            }

            .grid-container {
                padding: 15px;
            }

            .grid-background {
                gap: 15px;
            }

            .game-wrapper {
                max-width: 520px;
                margin: 0 auto;
            }
        }

        /* ========== 横屏适配 ========== */
        @media (orientation: landscape) and (max-height: 500px) {
            .header {
                flex-direction: row;
                padding: 8px 15px;
            }

            .game-main {
                padding: 10px;
            }

            .score-panel {
                padding: 8px 10px;
                gap: 8px;
                margin-bottom: 8px;
            }

            .score-panel .score-box {
                padding: 6px 10px;
                min-width: 65px;
            }

            .score-box .score-label {
                font-size: 0.65rem;
            }

            .score-box .score-value {
                font-size: 1.2rem;
            }

            .level-badge {
                font-size: 0.7rem;
                padding: 6px 8px;
                min-width: 65px;
                min-height: 50px;
                gap: 2px;
            }

            .level-badge .level-number {
                font-size: 0.6rem;
            }

            .level-badge .level-rank {
                font-size: 0.75rem;
            }

            .daily-progress {
                padding: 6px 10px;
                margin: 0 10px 8px 10px;
                gap: 8px;
                font-size: 0.75rem;
            }

            .daily-task-icon {
                font-size: 1rem;
            }

            .daily-task-name {
                font-size: 0.75rem;
                min-width: 70px;
            }

            .daily-task-bar {
                height: 6px;
                min-width: 50px;
            }

            .daily-task-count {
                font-size: 0.75rem;
                min-width: 35px;
            }

            .daily-task-reward {
                font-size: 0.7rem;
                padding: 2px 6px;
            }

            .grid-cell {
                width: 50px;
                height: 50px;
            }

            .powerup-bar {
                padding: 8px;
                margin-top: 10px;
            }

            .powerup-btn {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }

            .powerup-item-newgame {
                margin-left: 10px;
                padding-left: 10px;
            }

            .bottom-nav {
                padding: 5px 0;
            }
        }
        
        /* ========== Material Design 3 增强样式 ========== */
        /* 玻璃态卡片通用类 */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: var(--shadow-2);
        }
        
        /* 品牌渐变按钮 */
        .btn-brand {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
            border: none;
            box-shadow: var(--shadow-2);
        }
        
        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-3);
        }
        
        /* 成就图标增强 */
        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            display: flex;
            align-items: center;

    <script>
        // ==================== 游戏核心模块 ====================
        const GameCore = {
            grid: [],
            score: 0,
            bestScore: 0,
            gameOver: false,
            won: false,
            gridSize: 4,
            moveCount: 0,
            maxTile: 0,
            previousState: null,
            history: [],
            tileIdCounter: 0,
            gameStartTime: null,

            // 初始化游戏
            init() {
                this.loadBestScore();
                this.grid = Array(this.gridSize).fill(null).map(() => 
                    Array(this.gridSize).fill(null)
                );
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.moveCount = 0;
                this.maxTile = 0;
                this.history = [];
                this.tileIdCounter = 0;
                this.gameStartTime = Date.now();
                // 里程碑标记
                this.milestone512 = false;
                this.milestone1024 = false;
                this.milestone2048 = false;
                this.addRandomTile();
                this.addRandomTile();
                // 立即显示最高分
                document.getElementById('bestScore').textContent = this.bestScore;
                // 重置单局任务进度
                TaskSystem.resetRoundTasks();
                this.updateDisplay();
            },

            // 加载最高分
            loadBestScore() {
                const saved = localStorage.getItem('2048-best-score');
                this.bestScore = saved ? parseInt(saved) : 0;
            },

            // 保存最高分
            saveBestScore() {
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('2048-best-score', this.bestScore.toString());
                    return true;
                }
                return false;
            },

            // 添加随机方块
            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) {
                            emptyCells.push({ row: r, col: c });
                        }
                    }
                }
                if (emptyCells.length === 0) return null;

                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = this.getTileValue();
                const tile = {
                    id: ++this.tileIdCounter,
                    value: value,
                    row: cell.row,
                    col: cell.col,
                    isNew: true,
                    mergedFrom: null
                };
                this.grid[cell.row][cell.col] = tile;
                this.maxTile = Math.max(this.maxTile, value);
                return tile;
            },

            // 获取方块值（根据难度）
            getTileValue() {
                const difficulty = GameSettings.difficulty;
                let prob;
                switch(difficulty) {
                    case 'easy': prob = 0.1; break;
                    case 'normal': prob = 0.1; break;
                    case 'hard': prob = 0.25; break;
                    default: prob = 0.1;
                }
                return Math.random() < prob ? 4 : 2;
            },

            // 移动方块
            move(direction) {
                if (this.gameOver) return false;

                this.saveState();
                
                let moved = false;
                const vector = this.getVector(direction);
                const traversals = this.buildTraversals(vector);
                
                // 重置合并标记
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c]) {
                            this.grid[r][c].mergedFrom = null;
                            this.grid[r][c].isNew = false;
                        }
                    }
                }

                traversals.rows.forEach(row => {
                    traversals.cols.forEach(col => {
                        const tile = this.grid[row][col];
                        if (tile) {
                            const positions = this.findFarthestPosition(row, col, vector);
                            const next = positions.next;
                            
if (next && this.grid[next.row]?.[next.col]?.value === tile.value) {
                                const merged = {
                                    id: ++this.tileIdCounter,
                                    value: tile.value * 2,
                                    row: next.row,
                                    col: next.col,
                                    mergedFrom: [tile, this.grid[next.row][next.col]],
                                    isNew: false
                                };
                                this.grid[next.row][next.col] = merged;
                                this.grid[row][col] = null;
                                this.score += merged.value;
                                this.maxTile = Math.max(this.maxTile, merged.value);
                                moved = true;
                                
                                // 🎯 关键修复：合成特效调用（包括128方块）
                                if (merged.value >= 64) {  // 降低阈值，包括64、128、256等
                                    // 延迟调用特效，确保DOM已更新
                                    setTimeout(() => {
                                        // 使用更简单的方法计算位置
                                        const container = document.getElementById('tileContainer');
                                        if (container) {
                                            const rect = container.getBoundingClientRect();
                                            const x = rect.left + 150; // 固定位置测试
                                            const y = rect.top + 150;
                                            console.log('调用合成特效:', merged.value, x, y);
                                            this.showMergeEffect(merged.value, x, y);
                                        } else {
                                            console.error('找不到tileContainer');
                                        }
                                    }, 100);
                                }
                                
                                // 里程碑弹出提示
                                if (merged.value === 512 && !this.milestone512) {
                                    this.milestone512 = true;
                                    showToast('🎉 达成里程碑: 512!');
                                }
                                if (merged.value === 1024 && !this.milestone1024) {
                                    this.milestone1024 = true;
                                    showToast('🎊 达成里程碑: 1024!');
                                }
                                if (merged.value === 2048 && !this.milestone2048) {
                                    this.milestone2048 = true;
                                    showToast('🏆 恭喜达成2048! 你赢了!');
                                }

                                // 检查是否赢得游戏
                                if (merged.value === 2048 && !this.won) {
                                    this.won = true;
                                }
                            } else if (positions.farthest.row !== row || positions.farthest.col !== col) {
                                this.grid[positions.farthest.row][positions.farthest.col] = tile;
                                this.grid[row][col] = null;
                                tile.row = positions.farthest.row;
                                tile.col = positions.farthest.col;
                                moved = true;
                            }
                        }
                    });
                });

                if (moved) {
                    this.moveCount++;
                    this.addRandomTile();
                    this.updateDisplay();
                    
                    // 播放音效
                    if (GameSettings.soundEnabled) {
                        AudioManager.playMove();
                    }

                    // 检查游戏结束
                    if (!this.movesAvailable()) {
                        this.gameOver = true;
                        setTimeout(() => this.handleGameOver(), 300);
                    }

                    // 检查成就
                    AchievementSystem.check(this);
                } else {
                    this.restoreState();
                }

                return moved;
            },

            // 获取移动向量
            getVector(direction) {
                const vectors = {
                    up: { row: -1, col: 0 },
                    down: { row: 1, col: 0 },
                    left: { row: 0, col: -1 },
                    right: { row: 0, col: 1 }
                };
                return vectors[direction];
            },

            // 构建遍历顺序
            buildTraversals(vector) {
                const traversals = { rows: [], cols: [] };
                for (let i = 0; i < this.gridSize; i++) {
                    traversals.rows.push(i);
                    traversals.cols.push(i);
                }
                if (vector.row === 1) traversals.rows.reverse();
                if (vector.col === 1) traversals.cols.reverse();
                return traversals;
            },

            // 找到最远位置
            findFarthestPosition(row, col, vector) {
                let prev;
                do {
                    prev = { row, col };
                    row += vector.row;
                    col += vector.col;
                } while (row >= 0 && row < this.gridSize && 
                         col >= 0 && col < this.gridSize && 
                         !this.grid[row][col]);
                
                return {
                    farthest: prev,
                    next: row >= 0 && row < this.gridSize && col >= 0 && col < this.gridSize 
                        ? { row, col } : null
                };
            },

            // 检查是否有可用移动
            movesAvailable() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) return true;
                        if (this.canMerge(r, c)) return true;
                    }
                }
                return false;
            },

            // 检查是否可以合并
            canMerge(row, col) {
                const tile = this.grid[row][col];
                if (!tile) return false;
                const directions = [
                    { row: 0, col: 1 },
                    { row: 1, col: 0 }
                ];
                for (const dir of directions) {
                    const nr = row + dir.row;
                    const nc = col + dir.col;
                    if (nr < this.gridSize && nc < this.gridSize) {
                        const neighbor = this.grid[nr][nc];
                        if (neighbor && neighbor.value === tile.value) {
                            return true;
                        }
                    }
                }
                return false;
            },

            // 保存状态
            saveState() {
                this.history.push({
                    grid: JSON.parse(JSON.stringify(this.grid)),
                    score: this.score,
                    moveCount: this.moveCount,
                    maxTile: this.maxTile
                });
                if (this.history.length > 10) {
                    this.history.shift();
                }
            },

            // 恢复状态
            restoreState() {
                if (this.history.length > 0) {
                    this.history.pop();
                }
            },

            // 撤销操作
            undo() {
                if (this.history.length === 0) return false;
                const state = this.history.pop();
                this.grid = state.grid;
                this.score = state.score;
                this.moveCount = state.moveCount;
                this.maxTile = state.maxTile;
                this.gameOver = false;
                this.updateDisplay();
                return true;
            },

            // 获取提示（最佳移动方向）
            getHint() {
                const directions = ['up', 'down', 'left', 'right'];
                let bestMove = null;
                let bestScore = -1;
                
                for (const dir of directions) {
                    const testGrid = JSON.parse(JSON.stringify(this.grid));
                    let testScore = 0;
                    // 简单启发式：计算可能的合并数
                    const vector = this.getVector(dir);
                    for (let r = 0; r < this.gridSize; r++) {
                        for (let c = 0; c < this.gridSize; c++) {
                            if (testGrid[r][c]) {
                                const nr = r + vector.row;
                                const nc = c + vector.col;
                                if (nr >= 0 && nr < this.gridSize && 
                                    nc >= 0 && nc < this.gridSize &&
                                    testGrid[nr][nc] && 
                                    testGrid[nr][nc].value === testGrid[r][c].value) {
                                    testScore += testGrid[r][c].value * 2;
                                }
                            }
                        }
                    }
                    if (testScore > bestScore) {
                        bestScore = testScore;
                        bestMove = dir;
                    }
                }
                return bestMove || 'left';
            },

            // 洗牌功能
            shuffle() {
                console.log('🔀 开始洗牌...');
                const tiles = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c]) {
                            tiles.push(this.grid[r][c].value);
                            this.grid[r][c] = null;
                        }
                    }
                }
                
                // 随机排列
                for (let i = tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
                }
                
                // 重新放置
                let positions = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        positions.push({ row: r, col: c });
                    }
                }
                positions.sort(() => Math.random() - 0.5);
                
                tiles.forEach((value, index) => {
                    this.grid[positions[index].row][positions[index].col] = {
                        id: ++this.tileIdCounter,
                        value: value,
                        row: positions[index].row,
                        col: positions[index].col,
                        isNew: true,
                        mergedFrom: null
                    };
                });
                
                this.updateDisplay();
                if (GameSettings.soundEnabled) {
                    AudioManager.playMove();
                }
                showToast('🔀 洗牌成功!');
                
                // 强制重新渲染
                setTimeout(() => {
                    Renderer.render();
                }, 50);
            },

            // 更新显示
            updateDisplay() {
                Renderer.render();
                document.getElementById('currentScore').textContent = this.score;
                if (this.saveBestScore()) {
                    document.getElementById('bestScore').textContent = this.bestScore;
                }
                // 实时更新任务进度（针对分数和方块任务）
                TaskSystem.updateTask('score', this.score);
                TaskSystem.updateTask('tile256', this.maxTile);
            },

// 在合并方块时调用特效
            // 找到合并逻辑位置并添加特效调用
            // 在移动处理逻辑中添加合成特效
            
// 游戏结束处理 - 简化版本
            handleGameOver() {
                if (GameSettings.soundEnabled) {
                    AudioManager.playGameOver();
                }
                
                // 更新排行榜

            audioContext: null,

            init() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API not supported');
                }
            },

            playTone(frequency, duration, type = 'sine') {
                if (!this.audioContext || !this.soundEnabled) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            },

            playMove() {
                this.playTone(440, 0.1, 'sine');
            },

            playMerge() {
                this.playTone(523.25, 0.15, 'sine');

                // 排序并截取
                this.scores.daily = this.sortAndLimit(this.scores.daily, 10);

            sortAndLimit(arr, limit) {

                const now = new Date();
                const today = now.getDay();

                if (this.lastDailyReset !== now.toDateString()) {
                    this.scores.daily = [];
                    this.lastDailyReset = now.toDateString();
                    this.save();

                // 周日重置每周排行榜

            // 清零所有任务数据
            clearAllTaskData() {
                this.tasks = JSON.parse(JSON.stringify(this.defaultTasks));
                this.completedTasks = [];
                this.lastReset = new Date().toDateString();
                
                localStorage.removeItem(this.storageKey);
                localStorage.removeItem('completedDailyTasks');
                
                this.updateDailyProgressUI();

            init() {
                this.load();
                this.checkReset();
                this.updateDailyProgressUI();
            },

            updateDailyProgressUI() {
                // 找到第一个未完成任务
                const incompleteTasks = this.tasks.filter(t => !this.completedTasks.includes(t.id));
                
                const progressEl = document.getElementById('dailyProgress');
                const iconEl = document.getElementById('dailyTaskIcon');
                const nameEl = document.getElementById('dailyTaskName');
                const fillEl = document.getElementById('dailyTaskFill');
                const countEl = document.getElementById('dailyTaskCount');
                const rewardEl = document.getElementById('dailyTaskReward');
                
                if (!progressEl) return;
                
                // 检查是否所有任务都完成了
                if (incompleteTasks.length === 0) {
                    progressEl.classList.add('completed');
                    iconEl.textContent = '🎉';
                    nameEl.textContent = '今日任务全部完成';
                    fillEl.style.width = '100%';
                    countEl.textContent = `${this.completedTasks.length}/${this.tasks.length}`;
                    rewardEl.textContent = '✅已领取';
                    return;
                }
                
                // 显示第一个未完成任务
                const currentTask = incompleteTasks[0];
                const progress = Math.min(currentTask.progress, currentTask.target);
                const percent = Math.min(100, (progress / currentTask.target) * 100);
                
                progressEl.classList.remove('completed');
                iconEl.textContent = '🎯';
                nameEl.textContent = currentTask.name;
                fillEl.style.width = `${percent}%`;
                countEl.textContent = `${progress}/${currentTask.target}`;
                rewardEl.textContent = `💰${currentTask.reward || '随机道具'}`;
            },

            load() {
                const saved = localStorage.getItem(this.storageKey);
                if (saved) {
                    const data = JSON.parse(saved);
                    this.tasks = data.tasks || this.defaultTasks;
                    this.completedTasks = data.completedTasks || [];
                    this.lastReset = data.lastReset;
                } else {
                    this.tasks = JSON.parse(JSON.stringify(this.defaultTasks));
                }
            },

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify({
                    tasks: this.tasks,
                    completedTasks: this.completedTasks,
                    lastReset: this.lastReset
                }));
            },

            checkReset() {
                const today = new Date().toDateString();
                if (this.lastReset !== today) {
                    this.resetTasks();
                    this.lastReset = today;
                    this.save();
                }
            },

            resetTasks() {
                this.tasks = JSON.parse(JSON.stringify(this.defaultTasks));
                this.completedTasks = [];
            },

            resetRoundTasks() {
                // 重置单局任务进度（分数、方块）
                this.tasks.forEach(task => {
                    if (task.type === 'score' || task.type === 'tile') {
                        task.progress = 0;
                    }
                });
                // 从已完成列表中移除单局任务
                this.completedTasks = this.completedTasks.filter(id => {
                    const task = this.tasks.find(t => t.id === id);
                    return task && task.type !== 'score' && task.type !== 'tile';
                });
                this.save();
                this.updateDailyProgressUI();
            },

            updateTask(id, value) {
                const task = this.tasks.find(t => t.id === id);
                if (!task || this.completedTasks.includes(id)) return;
                
                // 根据任务类型更新进度
                if (task.type === 'score' || task.type === 'tile') {
                    // 分数/方块任务：直接设置当前值
                    task.progress = value;
                } else {
                    // 计数任务：累加
                    task.progress += value;
                }
                
                if (task.progress >= task.target) {
                    this.completeTask(id);
                }
                
                this.save();
                this.updateDailyProgressUI();
            },

        // ==================== 道具系统 ====================
        const PowerupSystem = {
            undo: 0,

            storageKey: '2048-powerups',

            init() {
                this.load();

            load() {

                if (saved) {
                    const data = JSON.parse(saved);

                localStorage.setItem(this.storageKey, JSON.stringify({
                    undo: this.undo,

                    hintUsedAt: this.hintUsedAt

                document.getElementById('shuffleCount').textContent = this.shuffle;
                
                document.getElementById('undoBtn').disabled = this.undo <= 0;

            useUndo() {
                if (this.undo <= 0) return false;
                if (GameCore.history.length === 0) {
                    showToast('没有可撤销的操作');
                    return false;
                }
                
                this.undo--;
                this.usedPowerup = true;
                GameCore.undo();
                TaskSystem.updateTask('powerup', 1);
                
                if (GameSettings.vibrationEnabled && navigator.vibrate) {
                    navigator.vibrate(30);
                }
                
                this.updateDisplay();
                this.save();
                return true;
            },

            useHint() {
                if (this.hint <= 0) {
                    showToast('提示次数不足');
                    return false;
                }
                if (this.hintShown) return false;
                
                this.hint--;
                this.hintShown = true;
                TaskSystem.updateTask('powerup', 1);
                
                const hint = GameCore.getHint();
                const arrows = {
                    up: '⬆️',
                    down: '⬇️',
                    left: '⬅️',
                    right: '➡️'
                };
                showToast('建议方向: ' + arrows[hint] + ' ' + hint);
                
                this.updateDisplay();
                this.save();
                
                // 3秒后重置提示显示
                setTimeout(() => { this.hintShown = false; }, 3000);
                return true;
            },

            useShuffle() {
                if (this.shuffle <= 0) {
                    showToast('洗牌次数不足');
                    return false;
                }
                
                this.shuffle--;
                this.usedPowerup = true;
                GameCore.shuffle();
                TaskSystem.updateTask('powerup', 1);
                
                // 洗牌后检查是否有可移动方向，如果有则允许继续游戏
                if (GameCore.gameOver && GameCore.movesAvailable()) {
                    GameCore.gameOver = false;

                    document.getElementById('gameOverOverlay').classList.remove('active');
                    showToast('🔄 洗牌成功！游戏继续！');

                    showToast('🔀 洗牌成功！');

                if (GameSettings.vibrationEnabled && navigator.vibrate) {
                    navigator.vibrate([20, 50, 20]);
                }
                
                this.updateDisplay();
                this.save();
                return true;
            },

            addItem(type, count = 1) {
                if (type === 'undo') this.undo += count;
                else if (type === 'hint') this.hint += count;
                else if (type === 'shuffle') this.shuffle += count;
                this.updateDisplay();
                this.save();
