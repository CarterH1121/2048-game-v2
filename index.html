        /* ========== 主容器 ========== */
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
            touch-action: pan-y;
        }

        /* ========== 顶部状态区 ========== */
        .header {
            padding: 15px 20px;
            padding-top: calc(15px + env(safe-area-inset-top));
            padding-left: calc(20px + env(safe-area-inset-left));
            padding-right: calc(20px + env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -2px;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .md3-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
            font-size: 0.4em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0;
            box-shadow: var(--shadow-1);
            -webkit-text-fill-color: white;
        }

        .level-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: var(--shadow-1);
            font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 90px;
            min-height: 60px;
        }

        .level-number {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .level-rank {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .level-rank-icon {
            font-size: 0.9rem;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            padding: 10px 20px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }

        .score-panel .score-box {
            flex: 1;
            min-width: 90px;
        }

        .score-panel .level-badge {
            flex: 1;
            white-space: nowrap;
        }

        /* 每日任务进度 */
        .daily-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            margin: 0 20px 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
        }

        .daily-task-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .daily-task-name {
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
            min-width: 80px;
        }

        .daily-task-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            min-width: 60px;
        }

        .daily-task-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-primary), var(--accent-color));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .daily-task-count {
            color: var(--text-primary);
            font-weight: 700;
            white-space: nowrap;
            min-width: 40px;
            text-align: center;
        }

        .daily-task-reward {
            color: #FFD700;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.8rem;
            padding: 3px 8px;
            background: rgba(255,215,0,0.15);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .daily-progress.completed .daily-task-icon {
            color: var(--success-color);
        }

        .daily-progress.completed .daily-task-name {
            color: var(--success-color);
        }

        .daily-progress.completed .daily-task-fill {
            background: var(--success-color);
        }

        .daily-progress.completed .daily-task-reward {
            color: var(--success-color);
            background: rgba(76,175,80,0.15);
            border-color: rgba(76,175,80,0.3);
        }

        /* ========== 游戏模式指示器 ========== */
        .mode-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 8px 16px;
            margin: 8px 0;
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .mode-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-icon {
            font-size: 1.2rem;
        }

        .mode-name {
            font-weight: 700;
            color: var(--brand-primary);
            font-size: 0.9rem;
        }

        .mode-target {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .target-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .target-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .target-value {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--brand-accent);
        }

        .target-progress-bar {
            width: 80px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .target-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(239, 68, 68, 0.15);
            border-radius: var(--radius-md);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .timer-display.warning {
            background: rgba(239, 68, 68, 0.3);
            animation: timer-pulse 0.5s ease infinite;
        }

        @keyframes timer-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }
            50% { 
                transform: scale(1.08); 
                box-shadow: 0 0 20px 5px rgba(99, 102, 241, 0.6);
            }
        }
        
        @keyframes bomb-pulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
                background-color: inherit;
            }
            50% { 
                transform: scale(1.05); 
                box-shadow: 0 0 15px 3px rgba(239, 68, 68, 0.8);
                background-color: rgba(239, 68, 68, 0.3);
            }
        }

        .timer-icon {
            font-size: 1rem;
        }

        .timer-value {
            font-weight: 800;
            font-size: 1.1rem;
            color: #EF4444;
            font-family: 'JetBrains Mono', monospace;
        }

        .timer-display.warning .timer-value {
            color: #FF0000;
        }

        /* 模式选择面板 */
        .mode-select-panel {
            padding: 20px;
        }

        .mode-select-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            text-align: center;
        }

        .mode-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-option:hover {
            border-color: var(--brand-primary);
            transform: translateY(-2px);
        }

        .mode-option.active {
            border-color: var(--brand-primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .mode-option-icon {
            font-size: 2rem;
            width: 50px;
            text-align: center;
        }

        .mode-option-info {
            flex: 1;
        }

        .mode-option-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .mode-option-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .mode-option-badge {
            padding: 4px 8px;
            background: var(--brand-primary);
            color: white;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* 挑战难度选择 */
        .challenge-targets {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
        }

        .challenge-target-btn {
            flex: 1;
            padding: 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .challenge-target-btn:hover {
            background: var(--brand-primary);
            color: white;
        }

        .challenge-target-btn.selected {
            background: var(--brand-primary);
            color: white;
        }

        /* 限时模式时间选择 */
        .timed-options {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
        }

        .timed-option-btn {
            flex: 1;
            padding: 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timed-option-btn:hover {
            background: #EF4444;
            color: white;
        }

        .timed-option-btn.selected {
            background: #EF4444;
            color: white;
        }
        
        .extreme-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .extreme-option-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 15px;
            border: 2px solid rgba(239, 68, 68, 0.3);
            background: var(--glass-bg);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
        }
        
        .extreme-option-btn:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        .extreme-option-btn.selected {
            background: linear-gradient(135deg, #ef4444 0%, #be185d 100%);
            color: white;
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        /* ========== AI分析面板样式 ========== */
        .ai-analysis-panel {
            padding: 20px;
            max-width: 400px;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .ai-icon {
            font-size: 2rem;
        }

        .ai-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .ai-best-move {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(245,158,11,0.2));
            border: 2px solid var(--brand-primary);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .ai-best-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .ai-best-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--brand-primary);
            margin-bottom: 8px;
        }

        .ai-reason {
            font-size: 0.85rem;
            color: var(--brand-accent);
            font-weight: 600;
        }

        .ai-evaluations {
            margin-bottom: 16px;
        }

        .ai-eval-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .ai-eval-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--glass-bg);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
        }

        .ai-eval-item.best {
            background: rgba(99,102,241,0.2);
            border: 1px solid var(--brand-primary);
        }

        .ai-eval-dir {
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 60px;
        }

        .ai-eval-score-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .ai-eval-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .ai-eval-score {
            font-weight: 700;
            min-width: 50px;
            text-align: right;
            color: var(--brand-primary);
        }

        .ai-best-badge {
            background: var(--brand-primary);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
        }

        .ai-eval-details {
            display: flex;
            gap: 12px;
            padding: 4px 8px 8px 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .ai-tips {
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            padding: 12px;
            margin-bottom: 16px;
        }

        .ai-tip-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .ai-tip-content {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ========== 数据统计面板样式 ========== */
        .stats-panel {
            padding: 20px;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .stats-panel::-webkit-scrollbar {
            width: 6px;
        }

        .stats-panel::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .stats-panel::-webkit-scrollbar-thumb {
            background: var(--brand-primary);
            border-radius: 3px;
        }

        .stats-panel::-webkit-scrollbar-thumb:hover {
            background: var(--brand-primary-light);
        }

        .stats-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stats-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
        }

        .stats-card.highlight {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(245,158,11,0.15));
            border-color: var(--brand-primary);
        }

        .stats-card-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .stats-card-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--brand-primary);
        }

        .stats-card-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stats-section {
            margin-bottom: 16px;
        }

        .stats-section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--glass-border);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
        }

        .stats-row-label {
            color: var(--text-secondary);
        }

        .stats-row-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .stats-chart {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            margin-top: 10px;
        }

.stats-chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--brand-primary), var(--brand-accent));
            border-radius: 2px 2px 0 0;
            min-height: 4px;
        }
        
        .unread-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 10px;
            font-weight: 700;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            animation: pulse 2s infinite;
        }
        
        .header-btn-item {
            position: relative;
        }

        .stats-chart-bar::after {
            content: attr(data-value);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .header-center {
            display: none;
        }

        .score-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);  /* 玻璃态边框 */
            padding: 10px 20px;
            border-radius: var(--radius-md);
            text-align: center;
            min-width: 80px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-2);
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        
        .header-btn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .header-btn-label {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background: var(--accent-color);
            color: white;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* ========== 核心游戏区 ========== */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            padding-bottom: 8px;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .grid-container {
            position: relative;
            background: var(--bg-grid);
            border-radius: 16px;
            padding: 10px;
            touch-action: none;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-3);
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-cell {
            width: 80px;
            height: 80px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: var(--radius-md);
        }

        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: var(--radius-md);
            transition: transform 0.15s ease-in-out;
            z-index: 10;
        }

        .tile-new {
            animation: tile-appear 0.2s ease;
        }

        @keyframes tile-appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tile-merged {
            animation: tile-pop 0.2s ease-out;
        }

        @keyframes tile-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-super {
            animation: tile-glow 2s ease-in-out infinite;
            color: #f9f6f2;
        }

        @keyframes tile-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        /* ========== 道具快捷栏 ========== */
        .powerup-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            width: min(100%, 520px);
            gap: 10px;
            padding: 10px 14px;
            background: var(--glass-bg);
            border-radius: 20px;
            margin-top: 12px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-2);
            transition: all 0.3s ease;
        }
        
        /* 道具栏展开/收起按钮 - 显示"道具"文字 */
        .powerup-toggle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .powerup-toggle-icon {
            font-size: 1.3rem;
        }
        
        .powerup-toggle-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .powerup-toggle:hover {
            transform: scale(1.05);
            background: var(--brand-primary);
            color: white;
        }
        
        .powerup-toggle:hover .powerup-toggle-label {
            color: white;
        }
        
        /* 道具容器 - 可横向滚动 */
        .powerup-items-container {
            display: flex;
            flex: 1 1 auto;
            min-width: 0;
            gap: 8px;
            align-items: center;
            transition: all 0.3s ease;
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 400px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 2px 0;
        }
        
        .powerup-items-container::-webkit-scrollbar {
            display: none;
        }
        
        .powerup-items-container.collapsed {
            max-width: 0;
            opacity: 0;
            padding: 0;
        }
        
        .powerup-items-container.expanded {
            opacity: 1;
        }

        .powerup-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
            min-width: 52px;
        }
        
        /* 外部标签隐藏，文字统一放在按钮内部 */
        .powerup-label {
            display: none;
        }

        .powerup-btn {
            width: 52px;
            height: auto;
            min-height: 52px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;

            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }
        
        .settings-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-1px);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        
        .btn-warning:hover {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            transform: translateY(-1px);
        }

/* ========== 皮肤选择器 ========== */
        .skin-modal-header {
            text-align: center;
            padding: 20px 0 10px;
        }
        
        .skin-modal-icon {
            font-size: 3rem;
            margin-bottom: 8px;
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .skin-modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .skin-modal-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px 5px;
        }

        .skin-card {
            position: relative;
            padding: 15px 12px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid transparent;
            overflow: hidden;
        }
        
        .skin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-color), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .skin-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .skin-card:hover::before {
            opacity: 1;
        }

        .skin-card.active {
            border: 2px solid var(--accent-color);
            background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(99,102,241,0.05) 100%);
            box-shadow: 0 0 20px rgba(99,102,241,0.3);
        }
        
        .skin-preview {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .skin-color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .skin-card:hover .skin-color-dot {
            transform: scale(1.1);
        }
        
        .skin-icon {
            font-size: 2.5rem;
            margin-bottom: 6px;
        }
        
        .skin-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .skin-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        /* ========== 排行榜 ========== */
        .leaderboard-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: var(--glass-bg);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--glass-border);
            font-family: 'Outfit', sans-serif;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
        }

        .leaderboard-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--glass-bg);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
        }

        .leaderboard-rank {
            width: 30px;
            text-align: center;
            font-weight: 700;
            color: var(--text-primary);
        }

        .leaderboard-name {
            flex: 1;
            padding: 0 10px;
            color: var(--text-primary);
        }

        .leaderboard-score {
            font-weight: 700;
            color: var(--accent-color);
        }

        /* ========== 成就面板 ========== */
        .achievement-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--glass-bg);
            border-radius: var(--radius-md);
            gap: 12px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .achievement-item.locked {
            opacity: 0.6;
        }

        .achievement-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .achievement-item.locked .achievement-icon {
            background: var(--btn-secondary);
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .achievement-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .achievement-status {
            font-size: 0.85rem;
            color: var(--success-color);
        }

        /* ========== 段位展示 ========== */
        .rank-display {
            text-align: center;
            padding: 20px;
            background: var(--glass-bg);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-2);
        }

        .rank-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .rank-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .rank-progress {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-grid);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* ========== 每日任务 ========== */
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--glass-bg);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            gap: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .task-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .task-progress {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .task-reward {
            font-size: 0.85rem;
            color: var(--success-color);
            font-weight: 600;
        }

        /* ========== 新手教程 ========== */
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .tutorial-overlay.active {
            display: flex;
        }

        .tutorial-box {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 320px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-3);
        }

        .tutorial-step {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .tutorial-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .tutorial-desc {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .tutorial-arrow {
            font-size: 3rem;
            color: var(--accent-color);
            animation: arrow-bounce 1s ease-in-out infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ========== 分享面板 ========== */
        .share-card-preview {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .share-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .share-info {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .share-message {
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            cursor: pointer;
        }

        .share-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: nowrap;
        }
        
        .share-buttons .btn {
            flex: 1;
            min-width: 0;
            padding: 10px 5px;
            font-size: 0.85rem;
        }

        /* ========== Toast提示（已整合到第1629行增强版） ========== */
        /* 经典主题下使用专用样式 */
        body.theme-classic .toast {
            background: var(--toast-bg);
            color: var(--toast-text);
            border: 2px solid var(--toast-border);
            box-shadow: 0 4px 12px rgba(119, 110, 101, 0.3);
            font-weight: bold;
            font-size: 16px;
            padding: 15px 30px;
            border-radius: 12px;
        }

        /* ========== 成就解锁动画 - 震撼大型弹窗 ========== */
        .achievement-unlock {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            min-width: 520px;
            max-width: 90vw;
            padding: 60px 50px 50px;
            border-radius: 24px;
            z-index: 1300;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            background: linear-gradient(145deg, 
                rgba(255, 248, 220, 0.95) 0%,
                rgba(255, 235, 180, 0.98) 30%,
                rgba(255, 215, 100, 0.95) 100%
            );
            box-shadow: 
                0 0 0 1px rgba(255, 215, 0, 0.5),
                0 0 30px rgba(255, 215, 0, 0.4),
                0 0 60px rgba(255, 200, 0, 0.3),
                0 0 100px rgba(255, 180, 0, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.6),
                inset 0 -2px 10px rgba(200, 150, 0, 0.2);
            border: 3px solid transparent;
            background-clip: padding-box;
            overflow: visible;
        }

        /* 玻璃态主题适配 */
        body.theme-neon .achievement-unlock,
        body.theme-material .achievement-unlock {
            background: linear-gradient(145deg,
                rgba(20, 25, 40, 0.95) 0%,
                rgba(30, 35, 55, 0.98) 50%,
                rgba(40, 45, 70, 0.95) 100%
            );
            box-shadow:
                0 0 0 1px rgba(255, 215, 0, 0.4),
                0 0 40px rgba(255, 215, 0, 0.3),
                0 0 80px rgba(255, 200, 0, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        /* 光晕背景层 */
        .achievement-unlock::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(255, 215, 0, 0.15) 0%,
                rgba(255, 200, 0, 0.1) 30%,
                rgba(255, 180, 0, 0.05) 50%,
                transparent 70%
            );
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .achievement-unlock.active {
            opacity: 1;
            visibility: visible;
            animation: achievement-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .achievement-unlock.active::before {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes achievement-entrance {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3) rotate(-5deg);
            }
            40% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.08) rotate(1deg);
            }
            70% {
                transform: translate(-50%, -50%) scale(0.95) rotate(-0.5deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0);
            }
        }

        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ========== 粒子爆发特效 ========== */
        /* 中心光爆 */
        .achievement-unlock .particle-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .achievement-unlock .particle-burst::before,
        .achievement-unlock .particle-burst::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
        }

        .achievement-unlock.active .particle-burst::before {
            animation: particle-explode-1 1s ease-out 0.2s forwards;
        }

        .achievement-unlock.active .particle-burst::after {
            animation: particle-explode-2 1s ease-out 0.25s forwards;
        }

        @keyframes particle-explode-1 {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0);
                box-shadow: 
                    60px -30px 0 0 #FFD700,
                    -60px -30px 0 0 #FFA500,
                    0px 70px 0 0 #FFEC8B,
                    80px 40px 0 0 #FFD700,
                    -80px 40px 0 0 #FFA500;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 
                    120px -60px 0 -4px transparent,
                    -120px -60px 0 -4px transparent,
                    0px 140px 0 -4px transparent,
                    160px 80px 0 -4px transparent,
                    -160px 80px 0 -4px transparent;
            }
        }

        @keyframes particle-explode-2 {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0) rotate(45deg);
                box-shadow: 
                    50px 40px 0 0 #FFEC8B,
                    -50px 40px 0 0 #FFD700,
                    90px -20px 0 0 #FFA500,
                    -90px -20px 0 0 #FFD700,
                    0px -80px 0 0 #FFEC8B;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) rotate(45deg);
                box-shadow: 
                    100px 80px 0 -4px transparent,
                    -100px 80px 0 -4px transparent,
                    180px -40px 0 -4px transparent,
                    -180px -40px 0 -4px transparent,
                    0px -160px 0 -4px transparent;
            }
        }

        /* 四角光芒 */
        .achievement-unlock .corner-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 24px;
        }

        .achievement-unlock .corner-glow::before,
        .achievement-unlock .corner-glow::after,
        .achievement-unlock .corner-glow .glow-tl,
        .achievement-unlock .corner-glow .glow-br {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, transparent 70%);
            opacity: 0;
        }

        .achievement-unlock .corner-glow::before {
            top: -20px;
            right: -20px;
        }

        .achievement-unlock .corner-glow::after {
            bottom: -20px;
            left: -20px;
        }

        .achievement-unlock .corner-glow .glow-tl {
            top: -20px;
            left: -20px;
        }

        .achievement-unlock .corner-glow .glow-br {
            bottom: -20px;
            right: -20px;
        }

        .achievement-unlock.active .corner-glow::before {
            animation: corner-flash 1.5s ease-out 0.3s forwards;
        }

        .achievement-unlock.active .corner-glow::after {
            animation: corner-flash 1.5s ease-out 0.35s forwards;
        }

        .achievement-unlock.active .corner-glow .glow-tl {
            animation: corner-flash 1.5s ease-out 0.4s forwards;
        }

        .achievement-unlock.active .corner-glow .glow-br {
            animation: corner-flash 1.5s ease-out 0.45s forwards;
        }

        @keyframes corner-flash {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 1;
                transform: scale(1.5);
            }
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
        }

        /* 环形光波 */
        .achievement-unlock .ring-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border: 3px solid rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
        }

        .achievement-unlock.active .ring-wave {
            animation: ring-expand 1.2s ease-out 0.1s forwards;
        }

        @keyframes ring-expand {
            0% {
                width: 50px;
                height: 50px;
                opacity: 1;
                border-width: 4px;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
                border-width: 1px;
            }
        }

        /* ========== 图标样式 - 大型震撼 ========== */
        .unlock-icon {
            font-size: 5.5rem;
            line-height: 1;
            margin-bottom: 20px;
            display: inline-block;
            position: relative;
            z-index: 10;
            transform: scale(0) rotate(-180deg);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .achievement-unlock.active .unlock-icon {
            animation: icon-grand-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
        }

        @keyframes icon-grand-entrance {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.3) rotate(10deg);
            }
            70% {
                transform: scale(0.9) rotate(-5deg);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        /* 图标光环 */
        .unlock-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 60%);
            border-radius: 50%;
            opacity: 0;
            z-index: -1;
        }

        .achievement-unlock.active .unlock-icon::before {
            animation: icon-glow-in 1s ease-out 0.6s forwards;
        }

        @keyframes icon-glow-in {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 标题样式 */
        .achievement-unlock .gameover-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 30%, #FFEC8B 50%, #FFD700 70%, #DAA520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            animation: title-shimmer 3s ease-in-out infinite;
        }

        .achievement-unlock.active .gameover-title {
            animation: title-entrance 0.6s ease-out 0.4s backwards, title-shimmer 3s ease-in-out 1s infinite;
        }

        @keyframes title-entrance {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes title-shimmer {
            0%, 100% {
                filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)) brightness(1);
            }
            50% {
                filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.5)) brightness(1.1);
            }
        }

        /* 描述文字 */
        .achievement-unlock .tutorial-desc {
            font-size: 1.2rem;
            color: #5D4E37;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(10px);
        }

        body.theme-neon .achievement-unlock .tutorial-desc,
        body.theme-material .achievement-unlock .tutorial-desc {
            color: rgba(255, 255, 255, 0.8);
        }

        .achievement-unlock.active .tutorial-desc {
            animation: desc-fade-in 0.5s ease-out 0.6s forwards;
        }

        @keyframes desc-fade-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮样式 */
        .achievement-unlock .btn-primary,
        .achievement-unlock .btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            color: #4A3000;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px 48px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 
                0 4px 15px rgba(255, 165, 0, 0.4),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
        }

        .achievement-unlock.active .btn-primary,
        .achievement-unlock.active .btn {
            animation: btn-pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;
        }

        @keyframes btn-pop-in {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .achievement-unlock .btn-primary:hover,
        .achievement-unlock .btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 6px 25px rgba(255, 165, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
        }

        .achievement-unlock .btn-primary:active,
        .achievement-unlock .btn:active {
            transform: scale(0.98);
        }

        /* 按钮光泽动画 */
        .achievement-unlock .btn-primary::before,
        .achievement-unlock .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .achievement-unlock .btn-primary:hover::before,
        .achievement-unlock .btn:hover::before {
            left: 100%;
        }

        /* 星星粒子装饰 - 纯CSS */
        .achievement-unlock .star-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .achievement-unlock .star-particles::before,
        .achievement-unlock .star-particles::after {
            content: '✦ ✧ ★ ☆ ✦ ✧';
            position: absolute;
            font-size: 16px;
            color: rgba(255, 215, 0, 0.8);
            white-space: nowrap;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .achievement-unlock .star-particles::before {
            top: 20%;
            left: -20px;
        }

        .achievement-unlock .star-particles::after {
            bottom: 25%;
            right: -30px;
        }

        .achievement-unlock.active .star-particles::before {
            animation: star-float-left 2s ease-out 0.5s forwards;
        }

        .achievement-unlock.active .star-particles::after {
            animation: star-float-right 2s ease-out 0.6s forwards;
        }

        @keyframes star-float-left {
            0% {
                opacity: 0;
                transform: translateX(-30px) translateY(-20px) rotate(-15deg);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
                transform: translateX(0) translateY(10px) rotate(0);
            }
        }

        @keyframes star-float-right {
            0% {
                opacity: 0;
                transform: translateX(30px) translateY(20px) rotate(15deg);

            30% {
                opacity: 1;

            100% {

        /* ========== 横屏适配 ========== */

                flex-direction: row;

        /* ========== Material Design 3 增强样式 ========== */

            border-radius: var(--radius-md);

            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--shadow-1);

        /* Material Design 3 风格波纹效果 */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;

        /* 解锁动画增强 */

        /* Toast active状态 - 必须在最后确保覆盖 */
        #toast.toast.active {
            opacity: 1 !important;

        }

</head>
