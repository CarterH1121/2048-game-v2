    <script>
        const API_BASE_URL = window.GAME2048_API_BASE_URL || (() => {
            const localHosts = new Set(['localhost', '127.0.0.1', '[::1]']);
            if (localHosts.has(window.location.hostname)) {
                return `${window.location.origin}/api`;
            }
            return `${window.location.protocol}//${window.location.hostname}:3001/api`;
        })();

        function escapeHTML(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        // ==================== API 集成模块 ====================
        const API = {
            baseUrl: API_BASE_URL,
            userId: null,
            username: null,
            nickname: '玩家',  // 显示名称
            isLoggedIn: false,
            isGuest: false,

            async request(path, options = {}) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                try {
                    const response = await fetch(`${this.baseUrl}${path}`, {
                        ...options,
                        signal: controller.signal
                    });
                    let data = {};
                    if (response.status !== 204) {
                        const contentType = response.headers.get('content-type') || '';
                        if (contentType.includes('application/json')) {
                            data = await response.json();
                        }
                    }
                    if (!response.ok) {
                        const error = new Error(data.error || `API请求失败 (${response.status})`);
                        error.status = response.status;
                        error.payload = data;
                        throw error;
                    }
                    return data;
                } finally {
                    clearTimeout(timeout);
                }
            },
            
            // 初始化 - 从本地恢复用户或显示注册界面
            init() {
                const savedUserId = localStorage.getItem('api_userId');
                const savedNickname = localStorage.getItem('user_nickname');
                const savedMode = localStorage.getItem('api_user_mode');
                
                if (savedUserId && savedNickname) {
                    this.isGuest = savedMode === 'guest';
                    this.userId = this.isGuest ? savedUserId : parseInt(savedUserId, 10);
                    this.nickname = savedNickname;
                    this.isLoggedIn = !this.isGuest && Number.isFinite(this.userId);
                    console.log(this.isGuest ? '恢复离线游客' : '恢复用户:', this.nickname);
                    return true;  // 用户已就绪
                } else {
                    // 新用户，显示命名界面
                    this.showNamingDialog();
                    return false;  // 等待用户注册
                }
            },
            
            // 显示命名界面
            showNamingDialog() {
                const randomName = this.generateRandomName();
                
                const content = `
                    <div class="naming-dialog">
                        <div class="naming-icon">🎮</div>
                        <div class="naming-title">欢迎来到 2048</div>
                        <div class="naming-subtitle">请输入你的昵称</div>
                        <input type="text" id="nicknameInput" value="${randomName}" maxlength="12" placeholder="输入昵称" class="naming-input">
                        <div class="naming-buttons">
                            <button class="btn btn-secondary" id="randomNameBtn">🎲 随机</button>
                            <button class="btn btn-primary" id="confirmNameBtn">✅ 开始游戏</button>
                        </div>
                    </div>
                `;
                
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('modalOverlay').classList.add('active');
                
                // 绑定事件
                document.getElementById('randomNameBtn').addEventListener('click', () => {
                    document.getElementById('nicknameInput').value = this.generateRandomName();
                });
                
                document.getElementById('confirmNameBtn').addEventListener('click', () => {
                    const name = document.getElementById('nicknameInput').value.trim();
                    this.confirmNickname(name);
                });
            },
            
            // 生成随机名称
            generateRandomName() {
                const prefixes = ['勇者', '智者', '探索者', '挑战者', '冒险家', '大师', '精英', '高手', '王者', '传奇'];
                const nums = Math.floor(Math.random() * 999);
                return prefixes[Math.floor(Math.random() * prefixes.length)] + nums;
            },
            
            // 确认昵称并注册
            async confirmNickname(name) {
                if (!name || name.length < 1 || name.length > 12) {
                    showToast('昵称需要1-12个字符');
                    return;
                }
                
                this.nickname = name;
                
                // 注册到服务器
                try {
                    const data = await this.request('/user/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: name })
                    });
                    
                    if (data.error && data.duplicate) {
                        // 名字重复
                        showToast('⚠️ ' + data.error);
                        document.getElementById('nicknameInput').value = this.generateRandomName();
                        return;
                    }
                    
                    if (data.user && data.user.id) {
                        this.userId = data.user.id;
                        this.isLoggedIn = true;
                        this.isGuest = false;
                        localStorage.setItem('api_userId', this.userId);
                        localStorage.setItem('user_nickname', data.user.nickname || name);
                        localStorage.setItem('api_user_mode', 'account');
                        console.log('注册成功:', name, 'ID:', this.userId);
                    } else {
                        throw new Error('注册返回数据异常');
                    }
                } catch (e) {
                    if (e.payload?.duplicate) {
                        showToast('⚠️ ' + (e.payload.error || '昵称已存在'));
                        document.getElementById('nicknameInput').value = this.generateRandomName();
                        return;
                    }
                    console.log('服务器注册失败:', e.message);
                    this.userId = `guest-${Date.now()}`;
                    this.isLoggedIn = false;
                    this.isGuest = true;
                    localStorage.setItem('api_userId', this.userId);
                    localStorage.setItem('user_nickname', name);
                    localStorage.setItem('api_user_mode', 'guest');
                }
                
                // 关闭弹窗
                document.getElementById('modalOverlay').classList.remove('active');
                showToast(this.isGuest
                    ? `📴 已进入离线游客模式，${this.nickname} 的进度仅保存在本机`
                    : `✅ 欢迎，${this.nickname}！`);
                
                // 初始化游戏
                if (typeof initGame === 'function') {
                    initGame();
                }
            },
            
            // 提交游戏记录
            async submitGame(score, moves, maxTile, gameMode, playTime, gameSessionId) {
                if (!this.isLoggedIn) return;
                try {
                    await this.request('/game/record', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: this.userId,
                            score: score,
                            moves: moves,
                            maxTile: maxTile,
                            mode: gameMode,
                            duration: playTime,
                            gameSessionId: gameSessionId  // 传递会话ID，后端用于去重
                        })
                    });
                    console.log('游戏记录已提交');
                } catch (e) {
                    console.log('提交记录失败:', e.message);
                }
            },
            
            // 获取全球排行榜
            async getGlobalLeaderboard(limit = 10) {
                try {
                    return await this.request(`/leaderboard/global?limit=${limit}`);
                } catch (e) {
                    console.log('获取排行榜失败:', e.message);
                    return { leaderboard: [] };
                }
            },
            
            // 解锁成就
            async unlockAchievement(achievementId) {
                if (!this.isLoggedIn) return;
                try {
                    await this.request('/achievements/unlock', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: this.userId,
                            achievementId: achievementId
                        })
                    });
                } catch (e) {
                    console.log('解锁成就失败:', e.message);
                }
            },
            
            // 获取用户道具
            async getUserItems() {
                if (!this.isLoggedIn) return { items: {} };
                try {
                    return await this.request(`/items/user/${this.userId}`);
                } catch (e) {
                    return { items: {} };
                }
            },
            
            // 使用道具
            async useItem(itemType) {
                if (!this.isLoggedIn) return;
                try {
                    await this.request('/items/use', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: this.userId,
                            itemType: itemType
                        })
                    });
                } catch (e) {
                    console.log('使用道具失败:', e.message);
                }
            }
        };
        
        // ==================== 游戏核心模块 ====================
        const GameCore = {
            grid: [],
            score: 0,
            bestScore: 0,
            gameOver: false,
            won: false,
            gridSize: 4,
            moveCount: 0,
            maxTile: 0,
            previousState: null,
            history: [],
            tileIdCounter: 0,
            gameStartTime: null,
            gameSessionId: null,  // 游戏会话ID，使用道具继续后保持不变

            // 初始化游戏
            init() {
                this.loadBestScore();
                
                // 尝试恢复之前的游戏状态
                if (GameSettings.autoSave && this.loadGameState()) {
                    console.log('恢复游戏进度');
                    return;
                }
                
                // 新游戏
                this.grid = Array(this.gridSize).fill(null).map(() => 
                    Array(this.gridSize).fill(null)
                );
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.moveCount = 0;
                this.maxTile = 0;
                this.history = [];
                this.tileIdCounter = 0;
                this.gameStartTime = Date.now();
                // 生成唯一游戏会话ID
                this.gameSessionId = `game-${API.userId}-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                this.milestone512 = false;
                this.milestone1024 = false;
                this.milestone2048 = false;
                this.addRandomTile();
                this.addRandomTile();
                document.getElementById('bestScore').textContent = this.bestScore;
                TaskSystem.resetRoundTasks();
                this.updateDisplay();
            },
            
            // 保存游戏状态
            saveGameState() {
                const state = {
                    grid: this.grid,
                    score: this.score,
                    moveCount: this.moveCount,
                    maxTile: this.maxTile,
                    gameOver: this.gameOver,
                    won: this.won,
                    tileIdCounter: this.tileIdCounter,
                    gameStartTime: this.gameStartTime,
                    gameSessionId: this.gameSessionId,  // 保存会话ID
                    mode: GameModeManager.currentMode,
                    timestamp: Date.now()
                };
                localStorage.setItem('2048-game-state', JSON.stringify(state));
            },
            
            // 加载游戏状态
            loadGameState() {
                const saved = localStorage.getItem('2048-game-state');
                if (!saved) return false;
                
                try {
                    const state = JSON.parse(saved);
                    // 超过1小时不恢复
                    if (Date.now() - state.timestamp > 3600000) {
                        localStorage.removeItem('2048-game-state');
                        return false;
                    }
                    
                    this.grid = state.grid;
                    this.score = state.score;
                    this.moveCount = state.moveCount;
                    this.maxTile = state.maxTile;
                    this.gameOver = state.gameOver;
                    this.won = state.won;
                    this.tileIdCounter = state.tileIdCounter;
                    this.gameStartTime = state.gameStartTime;
                    this.gameSessionId = state.gameSessionId;  // 恢复会话ID
                    
                    document.getElementById('bestScore').textContent = this.bestScore;
                    this.updateDisplay();
                    
                    if (state.mode) {
                        GameModeManager.currentMode = GameModeManager.normalizeMode(state.mode);
                    }
                    
                    showToast('✅ 已恢复游戏进度');
                    return true;
                } catch (e) {
                    return false;
                }
            },
            
            // 清除游戏状态
            clearGameState() {
                localStorage.removeItem('2048-game-state');
            },

            // 加载最高分
            loadBestScore() {
                const saved = localStorage.getItem('2048-best-score');
                this.bestScore = saved ? parseInt(saved) : 0;
            },

            // 保存最高分
            saveBestScore() {
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('2048-best-score', this.bestScore.toString());
                    return true;
                }
                return false;
            },

            // 添加随机方块
            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) {
                            emptyCells.push({ row: r, col: c });
                        }
                    }
                }
                if (emptyCells.length === 0) return null;

                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = this.getTileValue();
                const tile = {
                    id: ++this.tileIdCounter,
                    value: value,
                    row: cell.row,
                    col: cell.col,
                    isNew: true,
                    mergedFrom: null
                };
                this.grid[cell.row][cell.col] = tile;
                this.maxTile = Math.max(this.maxTile, value);
                return tile;
            },

            // 获取方块值（根据难度）
            getTileValue() {
                const difficulty = GameSettings.difficulty;
                let prob;
                switch(difficulty) {
                    case 'easy': prob = 0.1; break;
                    case 'normal': prob = 0.1; break;
                    case 'hard': prob = 0.25; break;
                    default: prob = 0.1;
                }
                return Math.random() < prob ? 4 : 2;
            },

            // 移动方块
            move(direction) {
                if (this.gameOver) return false;

                this.saveState();
                
                let moved = false;
                const vector = this.getVector(direction);
                const traversals = this.buildTraversals(vector);
                
                // 重置合并标记
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c]) {
                            this.grid[r][c].mergedFrom = null;
                            this.grid[r][c].isNew = false;
                        }
                    }
                }

                traversals.rows.forEach(row => {
                    traversals.cols.forEach(col => {
                        const tile = this.grid[row][col];
                        if (tile) {
                            const positions = this.findFarthestPosition(row, col, vector);
                            const next = positions.next;
                            
if (next && this.grid[next.row] && this.grid[next.row][next.col] && this.grid[next.row][next.col].value === tile.value) {
                                const merged = {
                                    id: ++this.tileIdCounter,
                                    value: tile.value * 2,
                                    row: next.row,
                                    col: next.col,
                                    mergedFrom: [tile, this.grid[next.row][next.col]],
                                    isNew: false
                                };
                                this.grid[next.row][next.col] = merged;
                                this.grid[row][col] = null;
                                
                                // 🎯 应用翻倍道具效果
                                let addScore = merged.value;
                                if (PowerupSystem.doubleActive) {
                                    addScore *= 2;
                                    PowerupSystem.doubleActive = false;
                                    showToast('✨ 翻倍生效! +' + addScore);
                                }
                                this.score += addScore;
                                this.maxTile = Math.max(this.maxTile, merged.value);
                                moved = true;
                                
                                // 🎯 合成特效调用 - 直接调用，不用setTimeout
                                if (merged.value >= 64) {
                                    const mergeValue = merged.value; // 捕获值
                                    // 直接调用特效
                                    const container = document.getElementById('tileContainer');
                                    if (container) {
                                        const rect = container.getBoundingClientRect();
                                        const x = rect.left + rect.width / 2;
                                        const y = rect.top + rect.height / 2;
                                        showMergeEffect(mergeValue, x, y);
                                    }
                                }
                                
                                // 里程碑弹出提示
                                if (merged.value === 512 && !this.milestone512) {
                                    this.milestone512 = true;
                                    showToast('🎉 达成里程碑: 512!');
                                }
                                if (merged.value === 1024 && !this.milestone1024) {
                                    this.milestone1024 = true;
                                    showToast('🎊 达成里程碑: 1024!');
                                }
                                if (merged.value === 2048 && !this.milestone2048) {
                                    this.milestone2048 = true;
                                    showToast('🏆 恭喜达成2048! 你赢了!');
                                }

                                // 检查是否赢得游戏
                                if (merged.value === 2048 && !this.won) {
                                    this.won = true;
                                    // 立即显示胜利画面，不要等到游戏结束
                                    setTimeout(() => {
                                        const overlay = document.getElementById('gameOverOverlay');
                                        if (overlay) {
                                            document.getElementById('finalScore').textContent = this.score;
                                            document.getElementById('maxTile').textContent = this.maxTile;
                                            document.getElementById('moveCount').textContent = this.moveCount;
                                            document.getElementById('gameOverTitle').textContent = '恭喜通关!';
                                            overlay.classList.add('active');
                                            Effects.celebrate();
                                        }
                                    }, 100);
                                }
                            } else if (positions.farthest.row !== row || positions.farthest.col !== col) {
                                this.grid[positions.farthest.row][positions.farthest.col] = tile;
                                this.grid[row][col] = null;
                                tile.row = positions.farthest.row;
                                tile.col = positions.farthest.col;
                                moved = true;
                            }
                        }
                    });
                });

                if (moved) {
                    this.moveCount++;
                    this.addRandomTile();
                    this.updateDisplay();
                    
                    // 游戏模式处理（挑战进度更新等）
                    GameModeManager.onMove();
                    
                    // 播放音效
                    if (GameSettings.soundEnabled) {
                        AudioManager.playMove();
                    }

                    // 检查游戏结束
                    if (!this.movesAvailable()) {
                        this.gameOver = true;
                        this.handleGameOver();
                    }

                    // 检查成就
                    AchievementSystem.check(this);
                } else {
                    // 无法移动时，检查是否真的游戏结束
                    if (!this.movesAvailable() && !this.gameOver) {
                        this.gameOver = true;
                        this.handleGameOver();
                    }
                    this.restoreState();
                }

                return moved;
            },

            // 获取移动向量
            getVector(direction) {
                const vectors = {
                    up: { row: -1, col: 0 },
                    down: { row: 1, col: 0 },
                    left: { row: 0, col: -1 },
                    right: { row: 0, col: 1 }
                };
                return vectors[direction];
            },

            // 构建遍历顺序
            buildTraversals(vector) {
                const traversals = { rows: [], cols: [] };
                for (let i = 0; i < this.gridSize; i++) {
                    traversals.rows.push(i);
                    traversals.cols.push(i);
                }
                if (vector.row === 1) traversals.rows.reverse();
                if (vector.col === 1) traversals.cols.reverse();
                return traversals;
            },

            // 找到最远位置
            findFarthestPosition(row, col, vector) {
                let prev;
                do {
                    prev = { row, col };
                    row += vector.row;
                    col += vector.col;
                } while (row >= 0 && row < this.gridSize && 
                         col >= 0 && col < this.gridSize && 
                         !this.grid[row][col]);
                
                return {
                    farthest: prev,
                    next: row >= 0 && row < this.gridSize && col >= 0 && col < this.gridSize 
                        ? { row, col } : null
                };
            },

            // 检查是否有可用移动
            movesAvailable() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) return true;
                        if (this.canMerge(r, c)) return true;
                    }
                }
                return false;
            },

            // 检查是否可以合并
            canMerge(row, col) {
                const tile = this.grid[row][col];
                if (!tile) return false;
                const directions = [
                    { row: 0, col: 1 },
                    { row: 1, col: 0 }
                ];
                for (const dir of directions) {
                    const nr = row + dir.row;
                    const nc = col + dir.col;
                    if (nr < this.gridSize && nc < this.gridSize) {
                        const neighbor = this.grid[nr][nc];
                        if (neighbor && neighbor.value === tile.value) {
                            return true;
                        }
                    }
                }
                return false;
            },

            // 保存状态
            saveState() {
                this.history.push({
                    grid: JSON.parse(JSON.stringify(this.grid)),
                    score: this.score,
                    moveCount: this.moveCount,
                    maxTile: this.maxTile
                });
                if (this.history.length > 10) {
                    this.history.shift();
                }
            },

            // 恢复状态
            restoreState() {
                if (this.history.length > 0) {
                    this.history.pop();
                }
            },

            // 撤销操作
            undo() {
                if (this.history.length === 0) return false;
                const state = this.history.pop();
                this.grid = state.grid;
                this.score = state.score;
                this.moveCount = state.moveCount;
                this.maxTile = state.maxTile;
                this.gameOver = false;
                this.updateDisplay();
                return true;
            },

            // 检查是否可以撤销
            canUndo() {
                return this.history.length > 0;
            },

            // 获取提示（最佳移动方向）- 增强版AI
            getHint() {
                const directions = ['up', 'down', 'left', 'right'];
                let bestMove = null;
                let bestScore = -Infinity;
                let analysis = {};
                
                for (const dir of directions) {
                    const result = this.evaluateMove(dir);
                    analysis[dir] = result;
                    if (result.score > bestScore) {
                        bestScore = result.score;
                        bestMove = dir;
                    }
                }
                
                // 保存分析结果供UI显示
                this.lastHintAnalysis = analysis;
                return bestMove || 'left';
            },

            // 评估单个移动方向（增强AI）
            evaluateMove(direction) {
                const testGrid = JSON.parse(JSON.stringify(this.grid));
                let score = 0;
                let merges = 0;
                let emptyCount = 0;
                let maxTileCorner = 0;
                let monotonicity = 0;
                
                const vector = this.getVector(direction);
                
                // 1. 计算合并分数
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (testGrid[r][c]) {
                            const nr = r + vector.row;
                            const nc = c + vector.col;
                            if (nr >= 0 && nr < this.gridSize && 
                                nc >= 0 && nc < this.gridSize &&
                                testGrid[nr][nc] && 
                                testGrid[nr][nc].value === testGrid[r][c].value) {
                                score += testGrid[r][c].value * 2;
                                merges++;
                            }
                        }
                    }
                }
                
                // 2. 模拟移动后计算空格数
                const simGrid = this.simulateMove(testGrid, direction);
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!simGrid[r][c]) emptyCount++;
                    }
                }
                score += emptyCount * 50; // 空格很重要
                
                // 3. 最大方块是否在角落
                let maxTile = 0;
                let maxPos = { r: 0, c: 0 };
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (simGrid[r][c] && simGrid[r][c].value > maxTile) {
                            maxTile = simGrid[r][c].value;
                            maxPos = { r, c };
                        }
                    }
                }
                // 角落位置：(0,0), (0,3), (3,0), (3,3)
                const corners = [[0,0], [0,3], [3,0], [3,3]];
                if (corners.some(c => c[0] === maxPos.r && c[1] === maxPos.c)) {
                    maxTileCorner = maxTile;
                    score += maxTile * 2; // 角落加分
                }
                
                // 4. 单调性检查（行/列递增递减）
                monotonicity = this.calculateMonotonicity(simGrid);
                score += monotonicity * 100;
                
                return {
                    score,
                    merges,
                    emptyAfter: emptyCount,
                    maxTileCorner,
                    monotonicity,
                    reasons: this.getMoveReasons(direction, merges, emptyCount, maxTileCorner > 0)
                };
            },

            // 模拟移动
            simulateMove(grid, direction) {
                const result = JSON.parse(JSON.stringify(grid));
                const vector = this.getVector(direction);
                
                // 简化的移动模拟
                for (let i = 0; i < 4; i++) {
                    for (let r = 0; r < this.gridSize; r++) {
                        for (let c = 0; c < this.gridSize; c++) {
                            if (result[r][c]) {
                                let nr = r + vector.row;
                                let nc = c + vector.col;
                                while (nr >= 0 && nr < this.gridSize && nc >= 0 && nc < this.gridSize) {
                                    if (!result[nr][nc]) {
                                        result[nr][nc] = result[r][c];
                                        result[r][c] = null;
                                    } else if (result[nr][nc].value === result[r][c]?.value) {
                                        result[nr][nc] = { value: result[r][c].value * 2 };
                                        result[r][c] = null;
                                        break;
                                    } else {
                                        break;
                                    }
                                    nr += vector.row;
                                    nc += vector.col;
                                }
                            }
                        }
                    }
                }
                return result;
            },

            // 计算单调性
            calculateMonotonicity(grid) {
                let score = 0;
                // 检查行单调性
                for (let r = 0; r < this.gridSize; r++) {
                    let increasing = 0, decreasing = 0;
                    for (let c = 1; c < this.gridSize; c++) {
                        if (grid[r][c] && grid[r][c-1]) {
                            if (grid[r][c].value >= grid[r][c-1].value) increasing++;
                            if (grid[r][c].value <= grid[r][c-1].value) decreasing++;
                        }
                    }
                    score += Math.max(increasing, decreasing);
                }
                // 检查列单调性
                for (let c = 0; c < this.gridSize; c++) {
                    let increasing = 0, decreasing = 0;
                    for (let r = 1; r < this.gridSize; r++) {
                        if (grid[r][c] && grid[r-1][c]) {
                            if (grid[r][c].value >= grid[r-1][c].value) increasing++;
                            if (grid[r][c].value <= grid[r-1][c].value) decreasing++;
                        }
                    }
                    score += Math.max(increasing, decreasing);
                }
                return score;
            },

            // 获取移动理由
            getMoveReasons(direction, merges, emptyAfter, hasCorner) {
                const reasons = [];
                if (merges >= 2) reasons.push('可进行' + merges + '次合并');
                if (emptyAfter >= 6) reasons.push('保留' + emptyAfter + '个空格');
                if (hasCorner) reasons.push('保持最大方块在角落');
                
                const dirNames = { up: '上', down: '下', left: '左', right: '右' };
                if (reasons.length === 0) {
                    reasons.push('向' + dirNames[direction] + '移动是最佳选择');
                }
                return reasons;
            },

            // 洗牌功能
            shuffle() {
                console.log('🔀 开始洗牌...');
                const tiles = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c]) {
                            tiles.push(this.grid[r][c].value);
                            this.grid[r][c] = null;
                        }
                    }
                }
                
                // 随机排列
                for (let i = tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
                }
                
                // 重新放置
                let positions = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        positions.push({ row: r, col: c });
                    }
                }
                positions.sort(() => Math.random() - 0.5);
                
                tiles.forEach((value, index) => {
                    this.grid[positions[index].row][positions[index].col] = {
                        id: ++this.tileIdCounter,
                        value: value,
                        row: positions[index].row,
                        col: positions[index].col,
                        isNew: true,
                        mergedFrom: null
                    };
                });
                
                this.updateDisplay();
                if (GameSettings.soundEnabled) {
                    AudioManager.playMove();
                }
                showToast('🔀 洗牌成功!');
                
                // 强制重新渲染
                setTimeout(() => {
                    Renderer.render();
                }, 50);
            },

            updateDisplay() {
                Renderer.render();
                document.getElementById('currentScore').textContent = this.score;
                if (this.saveBestScore()) {

                // 自动保存游戏进度
                if (GameSettings.autoSave && !this.gameOver) {

                }
            },

// 在合并方块时调用特效

// 游戏结束处理 - 简化版本
            handleGameOver() {
                // 防止重复调用
                if (this._handlingGameOver) return;
                this._handlingGameOver = true;
                
                // 清除保存的游戏状态
                this.clearGameState();
                
                if (GameSettings.soundEnabled) {
                    AudioManager.playGameOver();
                }
                
                // 计算游戏时长
                const playTime = this.gameStartTime ? Math.floor((Date.now() - this.gameStartTime) / 1000) : 0;
                
                // 🔗 提交游戏记录到API
                API.submitGame(this.score, this.moveCount, this.maxTile, GameModeManager.currentMode, playTime, this.gameSessionId);
                
                // 更新排行榜
                Leaderboard.addScore(this.score, GameModeManager.currentMode, this.maxTile);
                
                // 更新累计分数
                LevelSystem.addScore(this.score);
                
                // 更新任务进度
                TaskSystem.updateTask('games', 1);
                
                // 记录游戏数据到统计面板
                StatsPanel.recordGame(this.score, this.maxTile, GameModeManager.currentMode);
                
                // 显示游戏结束弹窗
                const overlay = document.getElementById('gameOverOverlay');
                if (overlay) {
                    document.getElementById('finalScore').textContent = this.score;
                    document.getElementById('maxTile').textContent = this.maxTile;

            startBGM() {
                if (!this.audioContext || !this.musicEnabled || this.bgmSource) return;
                
                this.bgmGain = this.audioContext.createGain();
                this.bgmGain.gain.value = this.masterVolume * this.musicVolume * 0.3;
                this.bgmGain.connect(this.audioContext.destination);
                
                // 创建简单的背景音乐循环
                const createBGMLoop = () => {
                    if (!this.musicEnabled || !this.audioContext) return;
                    
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(this.bgmGain);
                    
                    osc.type = 'sine';
                    osc.frequency.value = 261.63; // C4
                    
                    gain.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 2);
                    
                    osc.start();
                    osc.stop(this.audioContext.currentTime + 2);
                    
                    setTimeout(createBGMLoop, 2000);
                };
                
                createBGMLoop();
            },
            
            stopBGM() {
                if (this.bgmSource) {
                    this.bgmSource.stop();
                    this.bgmSource = null;
                }
            },

            playTone(frequency, duration, type = 'sine', volumeMultiplier = 1) {
                if (!this.audioContext || !this.soundEnabled) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                const finalVolume = this.masterVolume * this.sfxVolume * 0.3 * volumeMultiplier;
                gainNode.gain.setValueAtTime(finalVolume, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            },

            // 数据导入
            importAllData(jsonStr) {
                try {
                    const backup = JSON.parse(jsonStr);
                    
                    if (!backup.version || !backup.timestamp) {
                        throw new Error('无效的备份文件');
                    }
                    
                    // 恢复设置
                    if (backup.settings) {
                        Object.assign(this, backup.settings);
                        this.save();
                    }
                    
                    // 恢复音频设置
                    if (backup.audio) {
                        Object.assign(AudioManager, backup.audio);
                        AudioManager.saveSettings();
                    }
                    
                    // 恢复等级
                    if (backup.level) {
                        Object.assign(LevelSystem, backup.level);
                        LevelSystem.save();
                    }
                    
                    // 恢复成就
                    if (backup.achievements) {
                        AchievementSystem.achievements = backup.achievements;
                        AchievementSystem.unlocked = backup.unlockedAchievements || [];
                        AchievementSystem.save();
                    }
                    
                    // 恢复排行榜
                    if (backup.leaderboard) {
                        Leaderboard.scores = backup.leaderboard;
                        Leaderboard.save();
                    }
                    
                    // 恢复任务
                    if (backup.tasks) {
                        TaskSystem.tasks = backup.tasks;
                        TaskSystem.completedTasks = backup.completedTasks || [];
                        TaskSystem.save();
                    }
                    
                    // 恢复道具
                    if (backup.powerups) {
                        Object.assign(PowerupSystem, backup.powerups);
                        PowerupSystem.save();
                    }
                    
                    // 恢复游戏模式
                    if (backup.gameMode) {
                        GameModeManager.currentMode = backup.gameMode.currentMode;
                        GameModeManager.targetScore = backup.gameMode.targetScore;
                        GameModeManager.timeLimit = backup.gameMode.timeLimit;
                        GameModeManager.saveMode();
                    }
                    
                    // 应用主题
                    this.applyTheme();
                    
                    // 刷新显示
                    LevelSystem.updateDisplay();
                    PowerupSystem.updateDisplay();
                    TaskSystem.updateDailyProgressUI();
                    
                    showToast('✅ 数据已恢复！');
                    return true;
                    
                } catch (e) {
                    showToast('❌ 备份文件无效');
                    console.error('Import error:', e);
                    return false;
                }
            },

            calculateLevel() {
                for (let i = this.ranks.length - 1; i >= 0; i--) {

                const current = this.getCurrentRank();
                const next = this.getNextRank();
                if (!next) return 100;
                const progress = ((this.totalScore - current.minScore) / (next.minScore - current.minScore)) * 100;

            addScore(score, mode = 'classic', maxTile = 2) {

                    score, 
                    name, 
                    time: now,
                    mode: mode,
                    maxTile: maxTile,
                    date: new Date().toLocaleDateString()
                };
                
                this.scores.daily.push(entry);
                this.scores.weekly.push({...entry});
                this.scores.alltime.push({...entry});
                
                // 排序并截取
                this.scores.daily = this.sortAndLimit(this.scores.daily, 10);
                this.scores.weekly = this.sortAndLimit(this.scores.weekly, 20);
                this.scores.alltime = this.sortAndLimit(this.scores.alltime, 50);
                
                // 更新统计
                this.stats.totalGames++;
                this.stats.totalScore += score;
                this.stats.avgScore = Math.round(this.stats.totalScore / this.stats.totalGames);
                if (score > this.stats.bestScore) {
                    this.stats.bestScore = score;
                }
                if (maxTile > this.stats.highestTile) {
                    this.stats.highestTile = maxTile;
                }
                this.saveStats();
                
                this.save();

            sortAndLimit(arr, limit) {

            getRankBadge(rank) {

                if (rank === 3) return { icon: '🥉', class: 'bronze', label: '季军' };

                if (data.length === 0) {
                    return '<div style="text-align:center;padding:40px;color:var(--text-secondary);\"><div style=\"font-size:3rem;margin-bottom:16px;\">🎯</div><div>暂无记录</div><div style=\"font-size:0.85rem;margin-top:8px;\">完成游戏后记录将显示在这里</div></div>';

                return data.map((entry, index) => {
                    const rank = this.getRankBadge(index + 1);
                    const timeAgo = this.getTimeAgo(entry.time);
                    const modeIcon = entry.mode === 'challenge' ? '🎯' : entry.mode === 'timed' ? '⏱️' : '🎮';
                    const playerName = entry.name || '玩家';  // 显示名称
                    
                    return `
                        <div class="leaderboard-item rank-${rank.class}" style="display:flex;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:8px;transition:all 0.2s;">

                                    <span style="font-size:1.2rem;font-weight:700;color:var(--text-primary);">${entry.score.toLocaleString()}分</span>
                                </div>
                                <div style="font-size:0.8rem;color:var(--text-secondary);display:flex;gap:12px;margin-top:4px;">

            // 时间格式化
            getTimeAgo(timestamp) {
                const now = Date.now();
                const diff = now - timestamp;
                
                if (diff < 60000) return '刚刚';
                if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
                if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
                if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
                return new Date(timestamp).toLocaleDateString();
            },

                if (saved) {

                    this.currentSeason = data.currentSeason || 1;
                    this.seasonStartDate = data.seasonStartDate ? new Date(data.seasonStartDate) : this.getSeasonStart();
                    this.seasonScores = data.seasonScores || [];

                }

                localStorage.setItem(this.storageKey, JSON.stringify({

                    seasonStartDate: this.seasonStartDate.toISOString(),
                    seasonScores: this.seasonScores,
                    seasonRewards: this.seasonRewards
                }));

            getSeasonStart() {
                const now = new Date();
                return new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1);
            },
            
            getSeasonEnd() {
                const start = this.seasonStartDate;
                return new Date(start.getFullYear(), start.getMonth() + 3, 0, 23, 59, 59);
            },
            
            checkSeasonReset() {
                const now = new Date();
                if (now > this.seasonEndDate) {
                    // 赛季结束，发放奖励
                    this.distributeRewards();
                    
                    // 开始新赛季
                    this.currentSeason++;
                    this.seasonStartDate = this.getSeasonStart();
                    this.seasonEndDate = this.getSeasonEnd();
                    this.seasonScores = [];
                    this.seasonRewards = [];
                    this.save();
                    
                    showToast('🎉 新赛季开始！第' + this.currentSeason + '赛季');
                }
            },
            
            addScore(score, mode) {
                const now = Date.now();
                const entry = {
                    score,
                    mode,
                    time: now,
                    date: new Date().toLocaleDateString()
                };
                
                this.seasonScores.push(entry);
                this.seasonScores = this.seasonScores
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 100);
                
                this.save();
            },
            
            getRank() {
                if (this.seasonScores.length === 0) return 0;
                return this.seasonScores.findIndex(s => s.score === this.seasonScores[0].score) + 1;
            },
            
            getSeasonProgress() {
                const now = new Date();
                const total = this.seasonEndDate - this.seasonStartDate;
                const elapsed = now - this.seasonStartDate;
                return Math.min(100, Math.max(0, (elapsed / total) * 100));
            },
            
            getDaysRemaining() {
                const now = new Date();
                const remaining = this.seasonEndDate - now;
                return Math.max(0, Math.ceil(remaining / (1000 * 60 * 60 * 24)));
            },
            
            distributeRewards() {
                const rank = this.getRank();
                
                for (const reward of this.rewards) {
                    if (rank <= reward.rank && !this.seasonRewards.includes(reward.rank)) {
                        // 发放奖励
                        if (reward.items) {
                            Object.entries(reward.items).forEach(([item, count]) => {
                                PowerupSystem.addItem(item, count);
                            });
                        }
                        this.seasonRewards.push(reward.rank);
                        showToast('🏆 赛季奖励: ' + reward.reward);
                    }
                }
                
                this.save();
            },
            
            getSeasonInfo() {
                return {
                    season: this.currentSeason,
                    daysRemaining: this.getDaysRemaining(),
                    progress: this.getSeasonProgress(),
                    rank: this.getRank(),
                    topScore: this.seasonScores[0]?.score || 0,
                    gamesPlayed: this.seasonScores.length
                };
            }

                // 找到第一个未完成任务

                const progressEl = document.getElementById('dailyProgress');
                const iconEl = document.getElementById('dailyTaskIcon');

                if (!progressEl) return;

                    iconEl.textContent = '🎉';

                    countEl.textContent = `${this.completedTasks.length}/${this.tasks.length}`;
                    rewardEl.textContent = '✅已领取';
                    return;

                // 显示第一个未完成任务
                const currentTask = incompleteTasks[0];
                const progress = Math.min(currentTask.progress, currentTask.target);
                const percent = Math.min(100, (progress / currentTask.target) * 100);
                
                progressEl.classList.remove('completed');
                iconEl.textContent = '🎯';
                nameEl.textContent = currentTask.name;
                fillEl.style.width = `${percent}%`;
                countEl.textContent = `${progress}/${currentTask.target}`;
                rewardEl.textContent = `💰${currentTask.reward || '随机道具'}`;

            load() {

                if (saved) {
                    const data = JSON.parse(saved);
                    this.tasks = data.tasks || this.defaultTasks;
                    this.completedTasks = data.completedTasks || [];
                    this.lastReset = data.lastReset;
                } else {
                    this.tasks = JSON.parse(JSON.stringify(this.defaultTasks));
                }
            },

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify({
                    tasks: this.tasks,
                    completedTasks: this.completedTasks,
                    lastReset: this.lastReset
                }));

            checkReset() {
                const today = new Date().toDateString();
                if (this.lastReset !== today) {
                    this.resetTasks();
                    this.lastReset = today;
                    this.save();
                }
            },

            resetTasks() {
                this.tasks = JSON.parse(JSON.stringify(this.defaultTasks));
                this.completedTasks = [];
            },

            resetRoundTasks() {
                // 重置单局任务进度（分数、方块）
                this.tasks.forEach(task => {
                    if (task.type === 'score' || task.type === 'tile') {
                        task.progress = 0;
                    }
                });
                // 从已完成列表中移除单局任务
                this.completedTasks = this.completedTasks.filter(id => {
                    const task = this.tasks.find(t => t.id === id);
                    return task && task.type !== 'score' && task.type !== 'tile';
                });
                this.save();
                this.updateDailyProgressUI();
            },

            updateTask(id, value) {
                const task = this.tasks.find(t => t.id === id);
                if (!task || this.completedTasks.includes(id)) return;
                
                // 根据任务类型更新进度
                if (task.type === 'score' || task.type === 'tile') {
                    // 分数/方块任务：直接设置当前值
                    task.progress = value;
                } else {
                    // 计数任务：累加
                    task.progress += value;
                }
                
                if (task.progress >= task.target) {
                    this.completeTask(id);
                }
                
                this.save();
                this.updateDailyProgressUI();
            },

            completeTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (!task || this.completedTasks.includes(id)) return;
                
                // 标记为已完成
                this.completedTasks.push(id);
                
                // 发放奖励
                const reward = task.reward || '随机道具';
                if (reward.includes('道具')) {
                    PowerupSystem.addRandomItem();
                } else if (reward.includes('提示')) {
                    PowerupSystem.addItem('hint', 1);
                    showToast('🎉 任务完成！获得1个提示');
                } else if (reward.includes('撤销')) {
                    PowerupSystem.addItem('undo', 1);
                    showToast('🎉 任务完成！获得1个撤销');
                } else {
                    PowerupSystem.addRandomItem();
                    showToast('🎉 任务完成！奖励：' + reward);
                }
                
                this.save();
            },

            async syncFromAPI() {
                if (!API.isLoggedIn || !API.userId) return;
                
                try {
                    const response = await fetch(`${API.baseUrl}/items/user/${API.userId}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.items) {
                            // 支持两种格式：对象格式 {undo:3, hint:3} 或数组格式 [{item_type:'undo', count:3}]
                            if (Array.isArray(data.items)) {
                                data.items.forEach(item => {
                                    if (item.item_type === 'undo') this.undo = item.count;
                                    if (item.item_type === 'hint') this.hint = item.count;
                                    if (item.item_type === 'shuffle') this.shuffle = item.count;
                                    if (item.item_type === 'bomb') this.bomb = item.count;
                                    if (item.item_type === 'upgrade') this.upgrade = item.count;
                                    if (item.item_type === 'double') this.double = item.count;
                                });
                            } else {
                                // 对象格式
                                if (data.items.undo !== undefined) this.undo = data.items.undo;
                                if (data.items.hint !== undefined) this.hint = data.items.hint;
                                if (data.items.shuffle !== undefined) this.shuffle = data.items.shuffle;
                                if (data.items.bomb !== undefined) this.bomb = data.items.bomb;
                                if (data.items.upgrade !== undefined) this.upgrade = data.items.upgrade;
                                if (data.items.double !== undefined) this.double = data.items.double;
                            }
                            this.updateDisplay();
                            this.save();
                            console.log('道具数据已从API同步:', data.items);
                        }
                    }
                } catch (e) {
                    console.log('道具API同步失败，使用本地数据:', e);
                }

                        width: 8px;
                        height: 8px;

            addItem(type, count = 1) {
                if (type === 'undo') this.undo += count;
                else if (type === 'hint') this.hint += count;
                else if (type === 'shuffle') this.shuffle += count;
                else if (type === 'bomb') this.bomb += count;
                else if (type === 'upgrade') this.upgrade += count;
                else if (type === 'double') this.double += count;
                this.updateDisplay();
                this.save();
            },

            addRandomItem() {
                const items = ['undo', 'hint', 'shuffle', 'bomb', 'refresh', 'double'];
                const weights = [30, 30, 20, 10, 8, 2]; // 概率权重
                
                const totalWeight = weights.reduce((a, b) => a + b, 0);
                let random = Math.random() * totalWeight;
                
                let item = items[0];
                for (let i = 0; i < items.length; i++) {
                    random -= weights[i];
                    if (random <= 0) {
                        item = items[i];
                        break;
                    }
                }
                
                const names = {
                    undo: '撤销',
                    hint: '提示',
                    shuffle: '洗牌',
                    bomb: '炸弹',
                    refresh: '刷新',
                    double: '翻倍'
                };
                
                this.addItem(item);
                showToast('获得 1个' + names[item] + '道具!');
            },

                if (this.usedPowerup && game.won) {
                    AchievementSystem.unlock('comeback');
                }

                const arrows = { up: '⬆️ 上', down: '⬇️ 下', left: '⬅️ 左', right: '➡️ 右' };
                
                let evaluations = '';
                ['up', 'down', 'left', 'right'].forEach(dir => {
                    const data = analysis[dir];
                    if (!data) return;
                    
                    const isBest = dir === bestDir;
                    const scoreBar = Math.min(100, Math.max(0, data.score / 100));
                    
                    evaluations += `
                        <div class="ai-eval-item ${isBest ? 'best' : ''}">
                            <div class="ai-eval-dir">${arrows[dir]}</div>
                            <div class="ai-eval-score-bar">
                                <div class="ai-eval-fill" style="width: ${scoreBar}%"></div>
                            </div>
                            <div class="ai-eval-score">${data.score}</div>
                            ${isBest ? '<span class="ai-best-badge">推荐</span>' : ''}
                        </div>
                        <div class="ai-eval-details">
                            ${data.reasons ? data.reasons.map(r => `<span class="ai-reason">${r}</span>`).join('') : ''}
                        </div>
                    `;
                });
                
                const content = `
                    <div class="modal-title">🤖 AI策略分析</div>
                    <div class="modal-body">
                        <div class="ai-analysis-container">
                            ${evaluations}
                        </div>
                    </div>
                `;
                
                UI.showModal(content, 5000);
            }

            showFeedbackPanel() {
                const content = `
                    <div class="modal-title">💬 意见反馈</div>
                    <div class="modal-body">
                        <div class="feedback-section">
                            <div class="feedback-label">反馈类型</div>
                            <select class="feedback-select" id="feedbackType">
                                <option value="bug">🐛 问题反馈</option>
                                <option value="feature">💡 功能建议</option>
                                <option value="other">📝 其他意见</option>
                            </select>
                        </div>
                        
                        <div class="feedback-section">
                            <div class="feedback-label">详细描述</div>
                            <textarea class="feedback-textarea" id="feedbackContent" 
                                placeholder="请详细描述您的反馈内容..." 
                                maxlength="500"></textarea>
                        </div>
                        
                        <div class="feedback-section">
                            <div class="feedback-label">上传截图（可选）</div>
                            <div class="feedback-upload-area" id="feedbackUploadArea">
                                <input type="file" id="feedbackImage" accept="image/*" hidden>
                                <div class="upload-placeholder" id="uploadPlaceholder">
                                    <span class="upload-icon">📷</span>
                                    <span class="upload-text">点击上传图片</span>
                                </div>
                                <div class="upload-preview" id="uploadPreview" style="display:none;">
                                    <img id="previewImage" src="" alt="预览">
                                    <button class="remove-image" id="removeImageBtn">✕</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="feedback-actions">
                            <button class="btn btn-primary" id="submitFeedbackBtn">📤 提交反馈</button>
                        </div>
                    </div>
                `;
                this.showModal(content);
                
                // 绑定图片上传
                const uploadArea = document.getElementById('feedbackUploadArea');
                const fileInput = document.getElementById('feedbackImage');
                const placeholder = document.getElementById('uploadPlaceholder');
                const preview = document.getElementById('uploadPreview');
                const previewImg = document.getElementById('previewImage');
                const removeBtn = document.getElementById('removeImageBtn');
                
                let imageData = null;
                
                uploadArea.addEventListener('click', () => {
                    fileInput.click();
                });
                
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            imageData = event.target.result;
                            previewImg.src = imageData;
                            placeholder.style.display = 'none';
                            preview.style.display = 'flex';
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    imageData = null;
                    fileInput.value = '';
                    placeholder.style.display = 'flex';
                    preview.style.display = 'none';
                });
                
                // 提交反馈
                document.getElementById('submitFeedbackBtn').addEventListener('click', async () => {
                    const type = document.getElementById('feedbackType').value;
                    const contentText = document.getElementById('feedbackContent').value.trim();
                    
                    if (!contentText) {
                        showToast('请填写反馈内容');
                        return;
                    }
                    
                    try {
                        const data = await API.request('/feedback', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: API.userId,
                                nickname: API.nickname,
                                type: type,
                                content: contentText,
                                image: imageData
                            })
                        });
                        
                        if (data.success) {
                            showToast('✅ 反馈已提交，感谢您的意见！');
                            this.closeModal();
                        } else {
                            showToast('⚠️ 提交失败：' + (data.error || '网络错误'));
                        }
                    } catch (e) {
                        console.error('反馈提交错误:', e);
                        showToast('⚠️ 提交失败，请稍后重试');
                    }
                });
            },

            showAnnouncementPanel() {
                this.closeModal();
                
                // 从API获取公告
                API.request('/announcements')
                    .then(data => {
                        const announcements = data.announcements || [];
                        
                        // 获取已读公告ID
                        const readIds = JSON.parse(localStorage.getItem('read_announcements') || '[]');
                        
                        const formatDate = (dateStr) => {
                            if (!dateStr) return '';
                            const d = new Date(dateStr);
                            return `${d.getMonth()+1}/${d.getDate()}`;
                        };
                        
                        const content = `
                            <div class="announcement-header">
                                <div class="announcement-icon">📢</div>
                                <div class="announcement-title">游戏公告</div>
                            </div>
                            <div class="announcement-list">
                                ${announcements.length > 0 ? announcements.map(a => {
                                    const safeType = ['important', 'update', 'event', 'normal'].includes(a.type) ? a.type : 'normal';
                                    return `
                                    <div class="announcement-item ${!readIds.includes(a.id) ? 'new' : ''} ${safeType}">
                                        <div class="announcement-item-header">
                                            <span class="announcement-type-badge ${safeType}">
                                                ${safeType === 'important' ? '重要' : safeType === 'update' ? '更新' : safeType === 'event' ? '活动' : '通知'}
                                            </span>
                                            ${!readIds.includes(a.id) ? '<span class="announcement-new-badge">NEW</span>' : ''}
                                            <span class="announcement-date">${formatDate(a.created_at)}</span>
                                        </div>
                                        <div class="announcement-item-title">${escapeHTML(a.title)}</div>
                                        <div class="announcement-item-content">${escapeHTML(a.content)}</div>
                                    </div>
                                `}).join('') : '<div style="text-align:center;color:var(--text-secondary);padding:40px;">暂无公告</div>'}
                            </div>
                        `;
                        
                        // 标记所有公告为已读
                        const allIds = announcements.map(a => a.id);
                        localStorage.setItem('read_announcements', JSON.stringify(allIds));
                        
                        // 更新红点
                        this.updateAnnouncementBadge();
                        
                        this.showModal(content);
                    })
                    .catch(err => {
                        console.error('获取公告失败:', err);
                        showToast('⚠️ 获取公告失败');
                    });
            },
            
            updateAnnouncementBadge() {
                // 检查是否有未读公告
                API.request('/announcements')
                    .then(data => {
                        const announcements = data.announcements || [];
                        const readIds = JSON.parse(localStorage.getItem('read_announcements') || '[]');
                        const unreadCount = announcements.filter(a => !readIds.includes(a.id)).length;
                        
                        const badge = document.getElementById('announcementBadge');
                        if (badge) {
                            if (unreadCount > 0) {
                                badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                                badge.style.display = 'flex';
                            } else {
                                badge.style.display = 'none';
                            }
                        }
                    })
                    .catch(() => {});
            },

            doSignin() {
                if (!API.isLoggedIn) {
                    showToast('📴 游客模式下不可签到');
                    return;
                }
                const userId = API.userId || API.nickname;
                if (!userId) {
                    showToast('⚠️ 请先登录');
                    return;
                }
                
                // 调用API签到
                API.request('/sign/do', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                })
                    .then(data => {
                        if (data.success) {
                            // 刷新道具数量 - 从API同步最新数据
                            if (typeof PowerupSystem !== 'undefined') {
                                PowerupSystem.syncFromAPI();
                            }
                            
                            this.closeModal();

                            // 重新打开面板
                            setTimeout(() => this.showSigninPanel(), 500);
                        } else {
                            showToast('⚠️ ' + (data.error || '签到失败'));
                        }
                    })
                    .catch(err => {
                        console.error('签到失败:', err);
                        showToast('⚠️ 签到失败，请重试');

        // ==================== 输入控制 ====================
        const InputController = {
            touchStartX: 0,
            touchStartY: 0,
            touchEndX: 0,
            touchEndY: 0,

            init() {
                this.bindKeyboard();
                this.bindTouch();
            },

            bindKeyboard() {
                document.addEventListener('keydown', (e) => {
                    const keyMap = {
                        ArrowUp: 'up',
                        ArrowDown: 'down',
                        ArrowLeft: 'left',
                        ArrowRight: 'right',
                        w: 'up',
                        s: 'down',
                        a: 'left',
                        d: 'right'
                    };

                    if (keyMap[e.key]) {
                        e.preventDefault();
                        GameCore.move(keyMap[e.key]);
                    }
                });
            },

            bindTouch() {
                const gameGrid = document.getElementById('gameGrid');

                gameGrid.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                }, { passive: true });

                gameGrid.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });

                gameGrid.addEventListener('touchend', (e) => {
                    this.touchEndX = e.changedTouches[0].clientX;
                    this.touchEndY = e.changedTouches[0].clientY;
                    this.handleSwipe();
                }, { passive: true });

                // 鼠标拖拽支持
                let mouseDown = false;
                gameGrid.addEventListener('mousedown', (e) => {
                    mouseDown = true;
                    this.touchStartX = e.clientX;
                    this.touchStartY = e.clientY;
                });

                document.addEventListener('mouseup', (e) => {
                    if (mouseDown) {
                        mouseDown = false;
                        this.touchEndX = e.clientX;
                        this.touchEndY = e.clientY;
                        this.handleSwipe();
                    }
                });
                
                // 点击选择方块（用于升级/炸弹道具）
                gameGrid.addEventListener('click', (e) => {
                    // 升级模式
                    if (PowerupSystem.upgradeMode) {
                        const target = e.target.closest('.tile');
                        if (!target) return;
                        
                        const row = parseInt(target.dataset.row);
                        const col = parseInt(target.dataset.col);
                        
                        if (!isNaN(row) && !isNaN(col)) {
                            PowerupSystem.executeUpgrade(row, col);
                        }
                        return;
                    }
                    
                    // 炸弹模式
                    if (PowerupSystem.bombMode) {
                        const target = e.target.closest('.tile');
                        if (!target) return;
                        
                        const row = parseInt(target.dataset.row);
                        const col = parseInt(target.dataset.col);
                        
                        if (!isNaN(row) && !isNaN(col)) {
                            PowerupSystem.executeBomb(row, col);
                        }
                        return;
                    }
                });
                
                // 长按取消道具模式
                let longPressTimer;
                gameGrid.addEventListener('touchstart', (e) => {
                    if (!PowerupSystem.upgradeMode && !PowerupSystem.bombMode) return;
                    longPressTimer = setTimeout(() => {
                        if (PowerupSystem.upgradeMode) {
                            PowerupSystem.cancelUpgrade();
                        } else if (PowerupSystem.bombMode) {
                            PowerupSystem.cancelBomb();
                        }
                    }, 1000);
                });
                gameGrid.addEventListener('touchend', () => {
                    clearTimeout(longPressTimer);
                });
            },

            handleSwipe() {
                const deltaX = this.touchEndX - this.touchStartX;
                const deltaY = this.touchEndY - this.touchStartY;
                const minSwipe = 30;

                if (Math.abs(deltaX) < minSwipe && Math.abs(deltaY) < minSwipe) {
                    return;
                }

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    GameCore.move(deltaX > 0 ? 'right' : 'left');
                } else {
                    GameCore.move(deltaY > 0 ? 'down' : 'up');
                }
            }
        };

        // ==================== 数据统计面板 ====================

            // 获取完整统计数据

                    // 核心数据
                    totalGames: gamesPlayed,
                    bestScore: GameCore.bestScore || 0,
                    maxTile: LevelSystem.maxTile || 2,
                    totalScore: LevelSystem.totalScore || 0,
                    avgScore: gamesPlayed > 0 ? Math.round((LevelSystem.totalScore || 0) / gamesPlayed) : 0,
                    
                    // 等级数据
                    level: LevelSystem.level || 1,
                    exp: LevelSystem.exp || 0,
                    expToNext: LevelSystem.expToNext || 100,
                    
                    // 成就数据
                    achievementsUnlocked: AchievementSystem.getUnlockedCount(),
                    achievementsTotal: Object.keys(AchievementSystem.definitions || {}).length || 20,
                    
                    // 模式数据
                    classicGames: this.getModeGames('classic'),
                    challengeGames: this.getModeGames('challenge'),
                    challengeWins: this.getChallengeWins(),
                    timedGames: this.getModeGames('timed'),
                    
                    // 道具使用
                    totalHints: this.getItemUsage('hint'),
                    totalUndos: this.getItemUsage('undo'),
                    totalShuffles: this.getItemUsage('shuffle'),

                    // 最近成绩（最近10局）
