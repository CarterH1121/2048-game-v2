            renderChart(scores) {
                if (!scores || scores.length === 0) {
                    return '<div style="text-align:center;color:var(--text-secondary);padding:20px;">暂无数据</div>';
                }
                
                const maxScore = Math.max(...scores);
                const bars = scores.map(score => {
                    const height = maxScore > 0 ? Math.max(4, (score / maxScore) * 50) : 4;
                    return `<div class="stats-chart-bar" style="height:${height}px" data-value="${score}"></div>`;
                }).join('');
                
                return `<div class="stats-chart">${bars}</div>`;
            },

            formatTime(seconds) {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                if (hours > 0) {
                    return `${hours}小时${mins}分`;
                }
                return `${mins}分钟`;
            },

            // 记录游戏数据
            recordGame(score, maxTile, mode) {
                // 更新模式计数
                const modeGames = this.getModeGames(mode) + 1;
                localStorage.setItem(`2048-mode-${mode}-games`, modeGames.toString());
                
                // 记录近期成绩
                let recent = this.getRecentScores();
                recent.push(score);
                if (recent.length > 10) recent = recent.slice(-10);
                localStorage.setItem('2048-recent-scores', JSON.stringify(recent));
                
                // 更新游戏时长
                const gameTime = Math.floor((Date.now() - (GameCore.gameStartTime || Date.now())) / 1000);
                const totalTime = this.getPlayTime() + gameTime;
                localStorage.setItem('2048-total-playtime', totalTime.toString());
            },

            // 记录道具使用
            recordItemUse(item) {
                try {
                    const current = this.getItemUsage(item) + 1;
                    localStorage.setItem(`2048-item-${item}-used`, current.toString());
                } catch {}
            }

// ==================== Toast提示 ====================
        function showToast(message) {

        // ==================== 合成特效 ====================
        function showMergeEffect(value, x, y) {
            // 根据合成值决定特效等级
            const level = value >= 2048 ? 'legendary' : value >= 1024 ? 'epic' : value >= 512 ? 'rare' : 'common';
            const scale = Math.min(3, 1 + Math.log2(value) / 5);
            
            // 创建主特效容器
            const container = document.createElement('div');
            container.className = 'merge-effect-container';
            container.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;transform:translate(-50%,-50%);z-index:10000;pointer-events:none;';
            
            // 1. 外层光环爆炸效果
            const ring = document.createElement('div');
            ring.className = 'merge-ring ' + level;
            ring.style.cssText = 'position:absolute;width:300px;height:300px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;animation:ringExpand 0.8s ease-out forwards;';
            
            // 2. 中心光球
            const core = document.createElement('div');
            core.className = 'merge-core ' + level;
            core.style.cssText = 'position:absolute;width:100px;height:100px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;animation:corePulse 0.5s ease-out forwards;';
            
            // 3. 粒子爆炸（数量根据等级）
            const particleCount = level === 'legendary' ? 24 : level === 'epic' ? 16 : level === 'rare' ? 12 : 8;
            const particles = document.createElement('div');
            particles.className = 'merge-particles';
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                const angle = (360 / particleCount) * i;
                const color = level === 'legendary' ? '#ff0080' : level === 'epic' ? '#ffd700' : level === 'rare' ? '#00ff88' : '#4fc3f7';
                particle.style.cssText = 'position:absolute;width:8px;height:8px;background:' + color + ';border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);animation:particleFly 0.6s ease-out forwards;--angle:' + angle + 'deg;';
                particles.appendChild(particle);
            }
            
            // 4. 数字弹出效果
            const number = document.createElement('div');
            number.className = 'merge-number ' + level;
            number.style.cssText = 'position:relative;font-size:' + (2.5 * scale) + 'rem;font-weight:900;color:var(--text-primary);text-shadow:0 0 30px var(--brand-primary),0 4px 8px rgba(0,0,0,0.5);animation:numberPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;z-index:10;';
            number.textContent = value;
            
            // 5. 合成提示文字
            const text = document.createElement('div');
            text.className = 'merge-text';
            text.style.cssText = 'position:relative;font-size:1.2rem;color:#ffd700;font-weight:bold;text-shadow:0 0 20px rgba(255,215,0,0.8);margin-top:10px;animation:textFade 0.8s ease-out forwards;';
            text.textContent = level === 'legendary' ? '🏆 传奇合成！' : level === 'epic' ? '✨ 史诗合成！' : level === 'rare' ? '🌟 稀有合成！' : '🎉 合成成功！';
            
            // 组装特效
            container.appendChild(ring);
            container.appendChild(core);
            container.appendChild(particles);
            container.appendChild(number);
            container.appendChild(text);
            
            // 添加到页面
            document.body.appendChild(container);
            
            // 播放音效
            if (GameSettings.soundEnabled) {
                if (level === 'legendary') {
                    AudioManager.playWin && AudioManager.playWin();
                } else {
                    AudioManager.playMerge && AudioManager.playMerge();
                }
            }
            
            // 页面震动效果
            document.body.classList.add('merge-shake');
            setTimeout(() => document.body.classList.remove('merge-shake'), 300);
            
            // 屏幕闪光效果（传奇/史诗级别）
            if (level === 'legendary' || level === 'epic') {
                const flash = document.createElement('div');
                flash.style.cssText = 'position:fixed;inset:0;background:white;opacity:0.3;pointer-events:none;z-index:9999;animation:flashOut 0.3s ease-out forwards;';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 300);
            }
            
            // 自动移除特效
            setTimeout(() => {
                if (container.parentNode) {
                    container.style.opacity = '0';
                    container.style.transition = 'opacity 0.3s';
                    setTimeout(() => container.remove(), 300);
                }
            }, 1200);
        }

        // ==================== 游戏模式管理 ====================
        const GameModeManager = {
            currentMode: 'classic',  // classic, challenge, timed
            supportedModes: ['classic', 'challenge', 'timed'],
            targetScore: 0,          // 挑战模式目标分数
            timeLimit: 180,          // 限时模式时间（秒）
            timeRemaining: 0,        // 剩余时间
            timerInterval: null,     // 定时器
            challengeWon: false,     // 挑战是否成功
            timedEnded: false,       // 限时是否结束
            extremeSpeed: 1,         // 极限模式速度倍数
            extremeMultiplier: 1,    // 极限模式分数倍数

            modeConfig: {
                classic: {
                    name: '经典模式',
                    icon: '🎯',
                    desc: '无时间限制，轻松休闲'
                },
                challenge: {
                    name: '挑战模式',
                    icon: '🏆',
                    desc: '设定目标分数，突破自我',
                    targets: [5000, 10000, 20000, 50000]
                },
                timed: {
                    name: '限时模式',
                    icon: '⏱️',
                    desc: '分秒必争，心跳加速',
                    times: [60, 120, 180, 300]
                },
                extreme: {
                    name: '极限模式',
                    icon: '💀',
                    desc: '方块加速生成，分数翻倍！',
                    speeds: [1.5, 2, 3]
                }
            },

            init() {
                this.loadSavedMode();
                this.bindEvents();
                this.updateDisplay();
            },

            loadSavedMode() {
                const saved = localStorage.getItem('2048-game-mode');
                if (saved) {
                    const config = JSON.parse(saved);
                    this.currentMode = this.normalizeMode(config.mode);
                    this.targetScore = config.targetScore || 10000;
                    this.timeLimit = config.timeLimit || 180;
                } else {
                    this.currentMode = this.normalizeMode(GameSettings.defaultMode);
                }
            },

            normalizeMode(mode) {
                return this.supportedModes.includes(mode) ? mode : 'classic';
            },

            saveMode() {
                localStorage.setItem('2048-game-mode', JSON.stringify({
                    mode: this.currentMode,
                    targetScore: this.targetScore,
                    timeLimit: this.timeLimit
                }));
            },

            bindEvents() {
                document.getElementById('modeBtn').addEventListener('click', () => {
                    this.showModePanel();
                });
            },

            setMode(mode, options = {}) {
                const normalizedMode = this.normalizeMode(mode);
                this.currentMode = normalizedMode;
                if (normalizedMode === 'challenge') {
                    this.targetScore = options.targetScore || 10000;
                }
                if (normalizedMode === 'timed') {
                    this.timeLimit = options.timeLimit || 180;
                }
                this.saveMode();
                this.updateDisplay();
                showToast(`已切换至${this.modeConfig[normalizedMode].name}`);
            },

            updateDisplay() {
                const indicator = document.getElementById('modeIndicator');
                const modeIcon = document.getElementById('modeIcon');
                const modeName = document.getElementById('modeName');
                const targetDisplay = document.getElementById('targetScoreDisplay');
                const timerDisplay = document.getElementById('timerDisplay');

                targetDisplay.style.display = 'none';
                timerDisplay.style.display = 'none';

                if (this.currentMode === 'classic') {
                    indicator.style.display = 'none';
                } else {
                    indicator.style.display = 'flex';
                    modeIcon.textContent = this.modeConfig[this.currentMode].icon;
                    modeName.textContent = this.modeConfig[this.currentMode].name;

                    if (this.currentMode === 'challenge') {
                        targetDisplay.style.display = 'flex';
                        timerDisplay.style.display = 'none';
                        document.getElementById('targetScoreValue').textContent = this.targetScore;
                        this.updateProgress();
                    } else if (this.currentMode === 'timed') {
                        targetDisplay.style.display = 'none';
                        timerDisplay.style.display = 'flex';
                        this.timeRemaining = this.timeLimit;
                        this.updateTimerDisplay();
                    }
                }
            },

            updateProgress() {
                if (this.currentMode !== 'challenge') return;
                const progress = Math.min(100, (GameCore.score / this.targetScore) * 100);
                document.getElementById('targetProgressFill').style.width = `${progress}%`;
                
                // 达成目标
                if (GameCore.score >= this.targetScore && !this.challengeWon) {
                    this.challengeWon = true;
                    showToast('🎉 挑战成功！目标已达成！');
                    Effects.celebrate();
                }
            },

            updateTimerDisplay() {
                const minutes = Math.floor(this.timeRemaining / 60);
                const seconds = this.timeRemaining % 60;
                document.getElementById('timerValue').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                // 最后30秒警告
                const timerEl = document.getElementById('timerDisplay');
                if (this.timeRemaining <= 30) {
                    timerEl.classList.add('warning');
                } else {
                    timerEl.classList.remove('warning');
                }
            },

            startTimer() {
                if (this.currentMode !== 'timed' || this.timerInterval) return;
                
                this.timeRemaining = this.timeLimit;
                this.timedEnded = false;
                this.updateTimerDisplay();
                
                this.timerInterval = setInterval(() => {
                    this.timeRemaining--;
                    this.updateTimerDisplay();
                    
                    // 倒计时警告音效
                    if (this.timeRemaining === 30) {
                        AudioManager.playWarning();
                        showToast('⚠️ 还剩30秒！');
                    }
                    if (this.timeRemaining === 10) {
                        AudioManager.playWarning();
                    }
                    if (this.timeRemaining <= 5 && this.timeRemaining > 0) {
                        AudioManager.playTone(880, 0.1, 'square', 0.6);
                    }
                    
                    // 时间结束
                    if (this.timeRemaining <= 0) {
                        this.endTimedMode();
                    }
                }, 1000);
            },

            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
            },

            endTimedMode() {
                this.stopTimer();
                this.timedEnded = true;
                GameCore.gameOver = true;
                
                // 显示结果
                const overlay = document.getElementById('gameOverOverlay');
                document.getElementById('finalScore').textContent = GameCore.score;
                document.getElementById('maxTile').textContent = GameCore.maxTile;
                document.getElementById('moveCount').textContent = GameCore.moveCount;
                document.getElementById('gameOverTitle').textContent = '时间结束！';
                overlay.classList.add('active');
                
                // 记录限时模式成绩
                Leaderboard.addScore(GameCore.score, 'timed', GameCore.maxTile);
            },

            // 重置游戏时调用
            resetForNewGame() {
                this.challengeWon = false;
                this.timedEnded = false;
                this.stopTimer();
                this.updateDisplay();
                
                if (this.currentMode === 'timed') {
                    this.startTimer();
                }
            },

            // 每次移动后调用
            onMove() {
                if (this.currentMode === 'challenge') {
                    this.updateProgress();
                }
            },

            // 模式选择面板
            showModePanel() {
                const content = `
                    <div class="mode-select-panel">
                        <div class="mode-select-title">选择游戏模式</div>

                                </div>

                        </div>
                        
                        <!-- 挑战目标选择 -->

                            ${this.modeConfig.challenge.targets.map(t =>

                        </div>

                        </div>
                        
                        
                        <div class="modal-actions" style="margin-top: 20px;">

            bindModePanelEvents() {
                // 模式选项点击
                document.querySelectorAll('.mode-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        const mode = e.currentTarget.dataset.mode;
                        this.selectModeInPanel(mode);
                    });
                });

                // 挑战目标点击
                document.querySelectorAll('.challenge-target-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = parseInt(e.currentTarget.dataset.target);
                        this.targetScore = target;
                        document.querySelectorAll('.challenge-target-btn').forEach(b => b.classList.remove('selected'));
                        e.currentTarget.classList.add('selected');
                    });
                });

                // 限时时间点击
                document.querySelectorAll('.timed-option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const time = parseInt(e.currentTarget.dataset.time);
                        this.timeLimit = time;
                        document.querySelectorAll('.timed-option-btn').forEach(b => b.classList.remove('selected'));
                        e.currentTarget.classList.add('selected');
                    });
                });
                
            },

            selectModeInPanel(mode) {
                // 更新选中状态
                document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
                document.querySelector(`.mode-option[data-mode="${mode}"]`).classList.add('active');
                
                // 显示/隐藏子选项
                document.getElementById('challengeTargets').style.display = mode === 'challenge' ? 'flex' : 'none';
                document.getElementById('timedOptions').style.display = mode === 'timed' ? 'flex' : 'none';

                this.currentMode = this.normalizeMode(mode);
            },

            applyAndStart() {
                this.saveMode();
                this.updateDisplay();
                GameCore.clearGameState();
                GameCore.init();
                this.resetForNewGame();
            }
        };

        // ==================== 初始化 ====================
        function init() {
            // 先初始化API，检查用户状态
            const userReady = API.init();
            
            // 如果用户未注册，等待命名完成后再初始化游戏
            if (!userReady) {
                console.log('等待用户注册...');
                return;  // 不初始化游戏，等待用户完成命名
            }
            
            // 用户已登录，初始化游戏
            initGame();
        }
        
        // ==================== 日志上报模块 ====================
        const Logger = {
            apiUrl: `${API.baseUrl}/logs`,
            enabled: true,
            queue: [],
            timer: null,
            
            // 初始化 - 设置全局错误捕获
            init() {
                // 捕获JavaScript错误
                window.onerror = (msg, url, line, col, error) => {
                    this.logFrontendError({
                        errorType: error?.name || 'Error',
                        errorMessage: msg,
                        errorStack: error?.stack || '',
                        fileName: url,
                        lineNumber: line,
                        columnNumber: col,
                        pageUrl: window.location.href
                    });
                    return false; // 不阻止默认错误处理
                };
                
                // 捕获Promise未处理异常
                window.addEventListener('unhandledrejection', (event) => {
                    this.logFrontendError({
                        errorType: 'PromiseRejection',
                        errorMessage: event.reason?.message || String(event.reason),
                        errorStack: event.reason?.stack || '',
                        pageUrl: window.location.href
                    });
                });
                
                // 捕获资源加载错误
                window.addEventListener('error', (event) => {
                    if (event.target !== window) {
                        this.logFrontendError({
                            errorType: 'ResourceError',
                            errorMessage: `Failed to load: ${event.target.src || event.target.href}`,
                            pageUrl: window.location.href
                        });
                    }
                }, true);
                
                // 启动定时上报
                this.timer = setInterval(() => this.flush(), 5000);
                
                console.log('[Logger] 日志系统已启动');
            },
            
            // 记录前端错误
            logFrontendError(data) {
                if (!this.enabled) return;
                
                const logData = {
                    ...data,
                    userId: API.userId,
                    nickname: API.nickname,
                    browserInfo: {
                        userAgent: navigator.userAgent,
                        language: navigator.language,
                        platform: navigator.platform,
                        screenSize: `${screen.width}x${screen.height}`,
                        viewportSize: `${window.innerWidth}x${window.innerHeight}`
                    }
                };
                
                // 直接上报错误日志
                fetch(`${this.apiUrl}/frontend-error`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                }).catch(() => {}); // 静默失败
            },
            
            // 记录API错误
            logApiError(data) {
                if (!this.enabled) return;
                
                const logData = {
                    ...data,
                    userId: API.userId
                };
                
                fetch(`${this.apiUrl}/api-error`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                }).catch(() => {});
            },
            
            // 记录用户行为
            logBehavior(actionType, actionDetail = {}) {
                if (!this.enabled) return;
                
                const logData = {
                    userId: API.userId,
                    nickname: API.nickname,
                    actionType,
                    actionDetail,
                    pageUrl: window.location.href,
                    referrerUrl: document.referrer,
                    deviceType: this.getDeviceType()
                };
                
                // 加入队列，批量上报
                this.queue.push(logData);
                
                // 队列超过10条立即上报
                if (this.queue.length >= 10) {
                    this.flush();
                }
            },
            
            // 批量上报
            flush() {
                if (this.queue.length === 0) return;
                
                const logs = this.queue.splice(0, this.queue.length);
                
                // 逐条上报
                logs.forEach(log => {
                    fetch(`${this.apiUrl}/behavior`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(log)
                    }).catch(() => {});
                });
            },
            
            // 获取设备类型
            getDeviceType() {
                const ua = navigator.userAgent;
                if (/iPad|Tablet/i.test(ua)) return 'tablet';
                if (/Mobile|Android|iPhone/i.test(ua)) return 'mobile';
                return 'desktop';
            },
            
            // 常用行为快捷方法
            gameStart(mode) { this.logBehavior('game_start', { mode }); },
            gameEnd(score, mode) { this.logBehavior('game_end', { score, mode }); },
            itemUse(itemType) { this.logBehavior('item_use', { itemType }); },
            achievementUnlock(code) { this.logBehavior('achievement_unlock', { code }); },
            taskComplete(code) { this.logBehavior('task_complete', { code }); },
            skinChange(skinId) { this.logBehavior('skin_change', { skinId }); },
            modeSwitch(mode) { this.logBehavior('mode_switch', { mode }); },
            signIn() { this.logBehavior('sign_in'); },
            feedback(type) { this.logBehavior('feedback_submit', { type }); }
        };
        
        // 游戏初始化
        function initGame() {
            // 初始化各模块
            Logger.init();  // 日志系统优先初始化
            AudioManager.init();
            GameSettings.init();
            LevelSystem.init();
            AchievementSystem.init();
            Leaderboard.init();
            TaskSystem.init();
            SeasonSystem.init();
            PowerupSystem.init();
            GameModeManager.init();
            Renderer.init();
            UI.init();
            InputController.init();
            
            // 等待渲染完成后初始化游戏
            requestAnimationFrame(() => {
                GameCore.init();
                GameModeManager.resetForNewGame();
                TutorialSystem.init();
                SocialShare.checkChallengeLink();
            });
        }

        // 启动
        init();
    </script>
</html>
